<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow V6</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#1f2937;--blue:#2563eb;--green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--gray:#6b7280;--gray-bg:#f3f4f6;--amber:#d97706;--amber-bg:#fef3c7;--shadow:0 10px 25px rgba(15,23,42,.08);--radius:18px}
    [data-theme="dark"]{--bg:#0f172a;--panel:#111827;--text:#f9fafb;--muted:#9ca3af;--line:#374151;--brand:#f9fafb;--blue:#60a5fa;--gray-bg:#1f2937;--shadow:0 10px 25px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{padding:24px;border-right:1px solid var(--line);background:var(--panel);position:sticky;top:0;height:100vh;overflow:auto}.logo{font-weight:800;font-size:22px;letter-spacing:-.03em}.subtitle{color:var(--muted);font-size:13px;margin:4px 0 20px}.nav button{width:100%;display:flex;align-items:center;justify-content:space-between;border:0;background:transparent;color:var(--text);padding:11px 12px;border-radius:12px;margin:3px 0;text-align:left}.nav button.active{background:var(--brand);color:var(--panel)}.count{font-size:12px;color:var(--muted)}.nav button.active .count{color:inherit}.main{padding:28px;max-width:1500px;width:100%;margin:0 auto}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.title h1{font-size:30px;line-height:1.1;margin:0;letter-spacing:-.04em}.title p{margin:6px 0 0;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:9px 12px;border-radius:12px;box-shadow:0 1px 0 rgba(0,0,0,.02)}.btn.primary{background:var(--brand);color:var(--panel);border-color:var(--brand)}.btn.danger{color:var(--red);border-color:#fecaca}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.metric-label{font-size:13px;color:var(--muted);margin-bottom:8px}.metric-value{font-size:28px;font-weight:800;letter-spacing:-.04em}.metric-value.green{color:var(--green)}.metric-value.red{color:var(--red)}.metric-value.gray{color:var(--gray)}.metric-value.blue{color:var(--blue)}.section{margin-top:16px}.section h2{font-size:18px;margin:0 0 12px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.table{width:100%;border-collapse:collapse;min-width:900px}.table th,.table td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}.table th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:rgba(148,163,184,.08)}.table tr:last-child td{border-bottom:0}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}.pill.won{background:var(--green-bg);color:var(--green)}.pill.lost{background:var(--red-bg);color:var(--red)}.pill.dead{background:var(--gray-bg);color:var(--gray)}.pill.active{background:#dbeafe;color:var(--blue)}.pill.waiting{background:var(--amber-bg);color:var(--amber)}.pill.done{background:var(--green-bg);color:var(--green)}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.form .wide{grid-column:span 2}.form .full{grid-column:1/-1}label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 11px;background:var(--panel);color:var(--text)}textarea{min-height:76px;resize:vertical}.list{display:grid;gap:10px}.item{display:grid;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}.item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.item-title{font-weight:750}.muted{color:var(--muted)}.small{font-size:13px}.notes{font-size:13px;color:var(--muted);padding:8px 10px;background:rgba(148,163,184,.08);border-radius:10px;white-space:pre-wrap}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}.empty{border:1px dashed var(--line);border-radius:16px;padding:24px;text-align:center;color:var(--muted)}.status-select{min-width:110px;padding:7px 9px}.print-plan{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px}.quick-capture{margin-bottom:16px}.due-label{color:var(--red);font-weight:800}.footer-note{font-size:12px;color:var(--muted);margin-top:14px}@media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.two,.three{grid-template-columns:1fr}.form{grid-template-columns:1fr}.form .wide{grid-column:auto}.main{padding:18px}.topbar{align-items:flex-start;flex-direction:column}}@media print{.sidebar,.topbar .actions,.no-print,.btn{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}.print-plan{border:0}.section:not(.printable){display:none!important}body{background:#fff;color:#000}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const fmt=d=>d?new Date(d+'T00:00:00').toLocaleDateString():'';
const money=n=>Number(n||0).toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0});
const daysBetween=(a,b=todayISO())=>Math.floor((new Date(b)-new Date(a))/(86400000));
const uid=p=>p+'_'+Math.random().toString(36).slice(2,9);
const sample={
 theme:'light',
 tasks:[
  {id:uid('task'),title:'Finalize scope assumptions for mixed-use pursuit',type:'Proposal Action',category:'Proposals',priority:'P1',dueDate:todayISO(),status:'Today',big3:true,notes:'Confirm exclusions and fee strategy before sending.',completed:false,createdAt:todayISO()},
  {id:uid('task'),title:'Review RFI response before issue',type:'Project Action',category:'Active Projects',priority:'P1',dueDate:addDays(1),status:'This Week',big3:true,notes:'Coordinate with architect.',completed:false,createdAt:todayISO()},
  {id:uid('task'),title:'Follow up on submitted proposal',type:'Follow-Up',category:'Business Development',priority:'P2',dueDate:addDays(2),status:'This Week',big3:false,notes:'Check status and next steps.',completed:false,createdAt:todayISO()}
 ],
 pursuits:[
  {id:uid('pursuit'),opportunity:'510 N Gay Mixed-Use',architectClient:'MHM',developerClient:'TBD',projectType:'5-over-2 podium',constructionCost:50000000,proposedFee:295000,probability:60,proposalDueDate:addDays(6),expectedStartDate:addDays(60),revenueTiming:'Q3/Q4 2026',status:'Active',nextAction:'Confirm scope assumptions and fee strategy',notes:'Use podium benchmarks.'},
  {id:uid('pursuit'),opportunity:'Example Won Project',architectClient:'Smith Gee Studio',developerClient:'Example Client',projectType:'Multifamily',constructionCost:70000000,proposedFee:283000,probability:100,proposalDueDate:addDays(-14),expectedStartDate:addDays(45),revenueTiming:'Q3 2026',status:'Won',nextAction:'Kickoff setup',notes:'Sample won pursuit.'}
 ],
 relationships:[
  {id:uid('rel'),name:'Greg Buccola',company:'KPFF Latitude',role:'Managing Principal',type:'Internal',status:'Active',lastContactDate:addDays(-4),nextContactDate:addDays(3),notes:'Coordinate on Gray AES and strategic pursuits.'},
  {id:uid('rel'),name:'Smith Gee contact',company:'Smith Gee Studio',role:'Architect PM',type:'Architect Client',status:'Active',lastContactDate:addDays(-22),nextContactDate:todayISO(),notes:'Important Nashville multifamily relationship.'}
 ],
 waiting:[
  {id:uid('wait'),person:'Architect PM',company:'MHM',item:'Confirm proposal due date and final program',related:'510 N Gay Mixed-Use',lastContactDate:addDays(-7),followUpDate:todayISO(),status:'Waiting',notes:'Follow up if no response.'}
 ],
 meetings:[
  {id:uid('meet'),title:'Proposal review call',date:todayISO(),time:'10:00 AM',attendees:'Architect, KPFF',related:'510 N Gay Mixed-Use',prepNeeded:'Review fee assumptions',followUpNeeded:true,notes:'Capture actions.'}
 ],
 weekly:{outcomes:'',mondayBig3:''}
};
let state=load();let view='dashboard';
function load(){try{const saved=localStorage.getItem('focusflow_v6');return saved?{...sample,...JSON.parse(saved)}:sample}catch(e){return sample}}
function save(){localStorage.setItem('focusflow_v6',JSON.stringify(state))}
function setState(next){state={...state,...next};save();render()}
function activeTasks(){return state.tasks.filter(t=>!t.completed)}
function activePursuits(){return state.pursuits.filter(p=>!['Won','Lost','Dead'].includes(p.status))}
function calc(){const ap=activePursuits(); const won=state.pursuits.filter(p=>p.status==='Won').reduce((s,p)=>s+Number(p.proposedFee||0),0); const lost=state.pursuits.filter(p=>p.status==='Lost').reduce((s,p)=>s+Number(p.proposedFee||0),0); const dead=state.pursuits.filter(p=>p.status==='Dead').reduce((s,p)=>s+Number(p.proposedFee||0),0); return {open:activeTasks().length,big3:activeTasks().filter(t=>t.big3).length,overdue:activeTasks().filter(t=>t.dueDate && t.dueDate<todayISO()).length,pipeline:ap.reduce((s,p)=>s+Number(p.proposedFee||0),0),weighted:ap.reduce((s,p)=>s+Number(p.proposedFee||0)*Number(p.probability||0)/100,0),won,lost,dead,followups:state.waiting.filter(w=>!['Resolved','Dropped'].includes(w.status)&&w.followUpDate<=todayISO()).length,relDue:state.relationships.filter(r=>r.status!=='Inactive'&&r.nextContactDate<=todayISO()).length,meetings:state.meetings.filter(m=>m.date===todayISO()).length}}
function nav(){const c=calc(); const items=[['dashboard','Principal Dashboard',''],['today','Today',c.open],['pipeline','Proposal Pipeline',state.pursuits.length],['relationships','Relationships',state.relationships.length],['tasks','Tasks / Project Actions',state.tasks.length],['waiting','Waiting On',state.waiting.length],['meetings','Meetings',state.meetings.length],['weekly','Weekly Review',''],['backup','Settings / Backup','']]; return `<aside class="sidebar"><div class="logo">FocusFlow V6</div><div class="subtitle">KPFF Principal Operating System</div><div class="nav">${items.map(i=>`<button class="${view===i[0]?'active':''}" onclick="go('${i[0]}')"><span>${i[1]}</span><span class="count">${i[2]}</span></button>`).join('')}</div><div class="footer-note">Data saves in this browser. Use Export Backup regularly.</div></aside>`}
function top(title,sub){return `<div class="topbar"><div class="title"><h1>${title}</h1><p>${sub}</p></div><div class="actions no-print"><button class="btn" onclick="toggleTheme()">${state.theme==='dark'?'Light':'Dark'} Mode</button><button class="btn" onclick="exportData()">Export Backup</button></div></div>`}
function kpi(label,val,cls=''){return `<div class="card"><div class="metric-label">${label}</div><div class="metric-value ${cls}">${val}</div></div>`}
function dashboard(){const c=calc(); return `${top('Principal Dashboard','Business health, execution health, pursuits, relationships, and follow-ups.')}
<div class="grid kpis">${kpi('Active Pipeline',money(c.pipeline),'blue')}${kpi('Weighted Pipeline',money(c.weighted),'blue')}${kpi('Fee Won',money(c.won),'green')}${kpi('Fee Lost',money(c.lost),'red')}${kpi('Fee Dead',money(c.dead),'gray')}${kpi('Today\'s Big 3',c.big3)}${kpi('Overdue Actions',c.overdue,c.overdue?'red':'')}${kpi('Follow-Ups Due',c.followups,c.followups?'red':'')}</div>
<div class="grid two section"><div class="card"><div class="section-head"><h2>Today's Big 3</h2><button class="btn" onclick="go('today')">Open Today</button></div>${taskList(activeTasks().filter(t=>t.big3).slice(0,3))}</div><div class="card"><div class="section-head"><h2>Relationship Touches Due</h2><button class="btn" onclick="go('relationships')">Open Relationships</button></div>${relationshipMini(state.relationships.filter(r=>r.status!=='Inactive'&&r.nextContactDate<=todayISO()))}</div></div>
<div class="section card"><div class="section-head"><h2>Proposal Pipeline Snapshot</h2><button class="btn" onclick="go('pipeline')">Open Pipeline</button></div>${pipelineTable(state.pursuits.slice(0,8))}</div>
<div class="grid two section"><div class="card"><h2>Follow-Ups Due</h2>${waitingMini(state.waiting.filter(w=>!['Resolved','Dropped'].includes(w.status)&&w.followUpDate<=todayISO()))}</div><div class="card"><h2>Meetings Today</h2>${meetingMini(state.meetings.filter(m=>m.date===todayISO()))}</div></div>`}
function today(){return `${top('Today','Execution mode. Pick the Big 3, work due items, and clear follow-ups.')}${quickTask()}<div class="grid two"><div class="card"><h2>Today\'s Big 3</h2>${taskList(activeTasks().filter(t=>t.big3))}</div><div class="card"><h2>Due Today</h2>${taskList(activeTasks().filter(t=>t.dueDate===todayISO()))}</div></div><div class="grid two section"><div class="card"><h2>Follow-Ups Due Today</h2>${waitingMini(state.waiting.filter(w=>w.followUpDate<=todayISO()&&!['Resolved','Dropped'].includes(w.status)))}</div><div class="card"><h2>Meetings Today</h2>${meetingMini(state.meetings.filter(m=>m.date===todayISO()))}</div></div>`}
function quickTask(){return `<div class="card quick-capture"><h2>Quick Capture</h2><div class="form"><div class="wide"><label>Task title</label><input id="qt_title" placeholder="Add a task, project action, proposal action, follow-up..." /></div><div><label>Type</label><select id="qt_type"><option>Task</option><option>Project Action</option><option>Proposal Action</option><option>Follow-Up</option><option>Meeting Action</option><option>Personal</option></select></div><div><label>Priority</label><select id="qt_priority"><option>P1</option><option>P2</option><option>P3</option><option>P4</option></select></div><div><label class="due-label">Task Due Date</label><input id="qt_due" type="date" value="${todayISO()}" /></div><div><label>Status</label><select id="qt_status"><option>Today</option><option>This Week</option><option>Waiting</option><option>Someday</option><option>Not Started</option></select></div><div class="full"><label>Notes</label><textarea id="qt_notes" placeholder="Optional notes"></textarea></div><div><button class="btn primary" onclick="addTask()">Add Task</button></div></div></div>`}
function taskList(tasks){if(!tasks.length)return '<div class="empty">No tasks here.</div>'; return `<div class="list">${tasks.map(t=>`<div class="item"><div class="item-row"><div><div class="item-title">${esc(t.title)}</div><div class="small muted">${t.type} • ${t.priority} • <span class="due-label">Task Due Date:</span> ${fmt(t.dueDate)} • ${t.status}</div>${t.notes?`<div class="notes">${esc(t.notes)}</div>`:''}</div><div class="toolbar"><button class="btn" onclick="toggleBig3('${t.id}')">${t.big3?'Unstar':'Big 3'}</button><button class="btn" onclick="completeTask('${t.id}')">Done</button><button class="btn danger" onclick="deleteTask('${t.id}')">Delete</button></div></div></div>`).join('')}</div>`}
function pipeline(){const c=calc(); return `${top('Proposal Pipeline','Track pursuits, outcomes, fees won/lost/dead, probability, and revenue timing.')}
<div class="grid kpis">${kpi('Active Pipeline',money(c.pipeline),'blue')}${kpi('Weighted Active Pipeline',money(c.weighted),'blue')}${kpi('Fee Won',money(c.won),'green')}${kpi('Fee Lost',money(c.lost),'red')}${kpi('Fee Dead',money(c.dead),'gray')}</div>
${pipelineForm()}<div class="section card"><h2>All Pursuits</h2>${pipelineTable(state.pursuits,true)}</div>`}
function pipelineForm(){return `<div class="card"><h2>Add Pursuit</h2><div class="form"><div class="wide"><label>Opportunity</label><input id="p_opportunity" /></div><div><label>Architect Client</label><input id="p_architect" /></div><div><label>Developer Client</label><input id="p_developer" /></div><div><label>Project Type</label><input id="p_type" /></div><div><label>Construction Cost</label><input id="p_cost" type="number" /></div><div><label>Proposed Fee</label><input id="p_fee" type="number" /></div><div><label>Probability %</label><input id="p_prob" type="number" value="50" /></div><div><label>Proposal Due Date</label><input id="p_due" type="date" /></div><div><label>Expected Start Date</label><input id="p_start" type="date" /></div><div><label>Projected Revenue Timing</label><input id="p_rev" placeholder="Q3 2026" /></div><div><label>Status</label><select id="p_status"><option>Active</option><option>Submitted</option><option>Interview</option><option>Won</option><option>Lost</option><option>Dead</option><option>Dormant</option></select></div><div class="wide"><label>Next Action</label><input id="p_next" /></div><div class="full"><label>Notes</label><textarea id="p_notes"></textarea></div><div><button class="btn primary" onclick="addPursuit()">Add Pursuit</button></div></div></div>`}
function pipelineTable(rows,editable=false){if(!rows.length)return '<div class="empty">No pursuits yet.</div>'; return `<div class="table-wrap"><table class="table"><thead><tr><th>Opportunity</th><th>Clients</th><th>Fee</th><th>Probability</th><th>Weighted</th><th>Due</th><th>Start / Revenue</th><th>Status</th><th>Next Action</th>${editable?'<th>Actions</th>':''}</tr></thead><tbody>${rows.map(p=>`<tr><td><b>${esc(p.opportunity)}</b><div class="small muted">${esc(p.projectType||'')}</div>${p.notes?`<div class="notes">${esc(p.notes)}</div>`:''}</td><td><b>Architect:</b> ${esc(p.architectClient||'')}<br><b>Developer:</b> ${esc(p.developerClient||'')}</td><td>${money(p.proposedFee)}</td><td>${Number(p.probability||0)}%</td><td>${money(Number(p.proposedFee||0)*Number(p.probability||0)/100)}</td><td>${fmt(p.proposalDueDate)}</td><td>${fmt(p.expectedStartDate)}<br><span class="small muted">${esc(p.revenueTiming||'')}</span></td><td>${editable?statusSelect('pursuit',p.id,p.status):statusPill(p.status)}</td><td>${esc(p.nextAction||'')}</td>${editable?`<td><button class="btn danger" onclick="deletePursuit('${p.id}')">Delete</button></td>`:''}</tr>`).join('')}</tbody></table></div>`}
function statusSelect(kind,id,val){const opts=kind==='pursuit'?['Active','Submitted','Interview','Won','Lost','Dead','Dormant']:['Active','Follow Up','Inactive','Resolved','Dormant']; return `<select class="status-select" onchange="updateStatus('${kind}','${id}',this.value)">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select><div style="margin-top:6px">${statusPill(val)}</div>`}
function statusPill(s){let cls=s==='Won'?'won':s==='Lost'?'lost':s==='Dead'?'dead':s==='Waiting'?'waiting':s==='Done'||s==='Resolved'?'done':'active'; return `<span class="pill ${cls}">${esc(s||'Active')}</span>`}
function relationships(){return `${top('Relationships','Track relationship status, notes, last contact, and next contact dates.')}${relationshipForm()}<div class="section card"><h2>Relationship Board</h2>${relationshipTable(state.relationships,true)}</div>`}
function relationshipForm(){return `<div class="card"><h2>Add Relationship</h2><div class="form"><div><label>Name</label><input id="r_name" /></div><div><label>Company</label><input id="r_company" /></div><div><label>Role</label><input id="r_role" /></div><div><label>Type</label><select id="r_type"><option>Architect Client</option><option>Developer Client</option><option>Internal</option><option>Consultant</option><option>Contractor</option><option>Other</option></select></div><div><label>Status</label><select id="r_status"><option>Active</option><option>Follow Up</option><option>Inactive</option><option>Resolved</option><option>Dormant</option></select></div><div><label>Date of Last Contact</label><input id="r_last" type="date" /></div><div><label>Next Contact Date</label><input id="r_next" type="date" /></div><div class="full"><label>Notes</label><textarea id="r_notes" placeholder="Relationship notes visible in the summary board"></textarea></div><div><button class="btn primary" onclick="addRelationship()">Add Relationship</button></div></div></div>`}
function relationshipTable(rows,editable=false){if(!rows.length)return '<div class="empty">No relationships yet.</div>'; return `<div class="table-wrap"><table class="table"><thead><tr><th>Person</th><th>Type</th><th>Status</th><th>Date of Last Contact</th><th>Next Contact</th><th>Notes</th>${editable?'<th>Actions</th>':''}</tr></thead><tbody>${rows.map(r=>`<tr><td><b>${esc(r.name)}</b><br><span class="small muted">${esc(r.company||'')} • ${esc(r.role||'')}</span></td><td>${esc(r.type||'')}</td><td>${editable?statusSelect('relationship',r.id,r.status):statusPill(r.status)}</td><td>${fmt(r.lastContactDate)}</td><td>${fmt(r.nextContactDate)}</td><td>${r.notes?`<div class="notes">${esc(r.notes)}</div>`:''}</td>${editable?`<td><button class="btn danger" onclick="deleteRelationship('${r.id}')">Delete</button></td>`:''}</tr>`).join('')}</tbody></table></div>`}
function relationshipMini(rows){return rows.length?relationshipTable(rows,false):'<div class="empty">No relationship touches due.</div>'}
function tasks(){return `${top('Tasks / Project Actions','Unified task database. Project Actions are a task type. The date field is the Task Due Date.')}${quickTask()}<div class="card"><h2>Open Tasks</h2>${taskList(activeTasks())}</div><div class="section card"><h2>Completed Tasks</h2>${taskList(state.tasks.filter(t=>t.completed))}</div>`}
function waiting(){return `${top('Waiting On','Track pending responses, delegated items, and follow-up dates.')}${waitingForm()}<div class="section card"><h2>Waiting Board</h2>${waitingMini(state.waiting)}</div>`}
function waitingForm(){return `<div class="card"><h2>Add Waiting-On Item</h2><div class="form"><div><label>Person</label><input id="w_person" /></div><div><label>Company</label><input id="w_company" /></div><div class="wide"><label>Item / What I Need</label><input id="w_item" /></div><div><label>Related Project / Pursuit</label><input id="w_related" /></div><div><label>Last Contact Date</label><input id="w_last" type="date" /></div><div><label>Follow-Up Date</label><input id="w_follow" type="date" /></div><div><label>Status</label><select id="w_status"><option>Waiting</option><option>Follow Up Today</option><option>Resolved</option><option>Dropped</option></select></div><div class="full"><label>Notes</label><textarea id="w_notes"></textarea></div><div><button class="btn primary" onclick="addWaiting()">Add Waiting Item</button></div></div></div>`}
function waitingMini(rows){if(!rows.length)return '<div class="empty">No waiting-on items.</div>'; return `<div class="table-wrap"><table class="table"><thead><tr><th>Person</th><th>Item</th><th>Related</th><th>Last Contact</th><th>Follow-Up</th><th>Days Outstanding</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${rows.map(w=>`<tr><td><b>${esc(w.person)}</b><br><span class="small muted">${esc(w.company||'')}</span></td><td>${esc(w.item)}</td><td>${esc(w.related||'')}</td><td>${fmt(w.lastContactDate)}</td><td>${fmt(w.followUpDate)}</td><td>${w.lastContactDate?daysBetween(w.lastContactDate):''}</td><td><select class="status-select" onchange="updateStatus('waiting','${w.id}',this.value)">${['Waiting','Follow Up Today','Resolved','Dropped'].map(o=>`<option ${o===w.status?'selected':''}>${o}</option>`).join('')}</select></td><td>${w.notes?`<div class="notes">${esc(w.notes)}</div>`:''}</td><td><button class="btn danger" onclick="deleteWaiting('${w.id}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`}
function meetings(){return `${top('Meetings','Manual meeting tracking for prep and follow-up.')}${meetingForm()}<div class="section card"><h2>Meeting Board</h2>${meetingMini(state.meetings,true)}</div>`}
function meetingForm(){return `<div class="card"><h2>Add Meeting</h2><div class="form"><div class="wide"><label>Meeting Title</label><input id="m_title" /></div><div><label>Date</label><input id="m_date" type="date" /></div><div><label>Time</label><input id="m_time" /></div><div><label>Attendees</label><input id="m_attendees" /></div><div><label>Related</label><input id="m_related" /></div><div class="wide"><label>Prep Needed</label><input id="m_prep" /></div><div><label>Follow-Up Needed</label><select id="m_follow"><option value="true">Yes</option><option value="false">No</option></select></div><div class="full"><label>Notes</label><textarea id="m_notes"></textarea></div><div><button class="btn primary" onclick="addMeeting()">Add Meeting</button></div></div></div>`}
function meetingMini(rows,editable=false){if(!rows.length)return '<div class="empty">No meetings here.</div>'; return `<div class="table-wrap"><table class="table"><thead><tr><th>Meeting</th><th>Date</th><th>Time</th><th>Related</th><th>Prep</th><th>Follow-Up</th>${editable?'<th>Actions</th>':''}</tr></thead><tbody>${rows.map(m=>`<tr><td><b>${esc(m.title)}</b><br><span class="small muted">${esc(m.attendees||'')}</span></td><td>${fmt(m.date)}</td><td>${esc(m.time||'')}</td><td>${esc(m.related||'')}</td><td>${esc(m.prepNeeded||'')}</td><td>${m.followUpNeeded?'Yes':'No'}</td>${editable?`<td><button class="btn danger" onclick="deleteMeeting('${m.id}')">Delete</button></td>`:''}</tr>`).join('')}</tbody></table></div>`}
function weekly(){const overdue=activeTasks().filter(t=>t.dueDate<todayISO()); const dueP=state.pursuits.filter(p=>p.proposalDueDate<=addDays(14)&&!['Won','Lost','Dead'].includes(p.status)); return `${top('Weekly Review','Review, triage, and create a printable weekly plan.')}
<div class="grid two"><div class="card"><h2>1. Review Overdue Tasks</h2>${taskList(overdue)}</div><div class="card"><h2>2. Review Waiting On</h2>${waitingMini(state.waiting.filter(w=>!['Resolved','Dropped'].includes(w.status)))}</div></div><div class="section card"><h2>3. Review Proposal Priorities</h2>${pipelineTable(dueP)}</div><div class="section card"><h2>4. Set Next Week's Priorities</h2><div class="form"><div class="full"><label>Next Week Big Outcomes</label><textarea id="week_outcomes">${esc(state.weekly.outcomes||'')}</textarea></div><div class="full"><label>Monday Big 3</label><textarea id="week_big3">${esc(state.weekly.mondayBig3||'')}</textarea></div><div><button class="btn primary" onclick="saveWeekly()">Save Weekly Plan</button></div><div><button class="btn" onclick="window.print()">Print Weekly Plan</button></div></div></div><div class="section printable"><div class="print-plan"><h1>Weekly Plan</h1><h2>Big Outcomes</h2><pre>${esc(state.weekly.outcomes||'')}</pre><h2>Monday Big 3</h2><pre>${esc(state.weekly.mondayBig3||'')}</pre><h2>Proposal Priorities</h2>${pipelineTable(dueP)}<h2>Follow-Ups</h2>${waitingMini(state.waiting.filter(w=>!['Resolved','Dropped'].includes(w.status)))}</div></div>`}
function backup(){return `${top('Settings / Backup','Export, import, reset sample data, and protect your local data.')}
<div class="card"><h2>Backup Tools</h2><div class="toolbar"><button class="btn primary" onclick="exportData()">Export Backup JSON</button><label class="btn">Import Backup JSON<input type="file" accept="application/json" class="hidden" onchange="importData(event)"></label><button class="btn danger" onclick="resetData()">Reset Sample Data</button></div><p class="muted small">Your data is stored in this browser/app. Export backups to OneDrive periodically.</p></div>`}
function page(){return {dashboard,today,pipeline,relationships,tasks,waiting,meetings,weekly,backup}[view]()} 
function render(){document.documentElement.dataset.theme=state.theme||'light'; document.getElementById('root').innerHTML=`<div class="app">${nav()}<main class="main">${page()}</main></div>`}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
window.go=v=>{view=v;render()}; window.toggleTheme=()=>setState({theme:state.theme==='dark'?'light':'dark'});
window.addTask=()=>{const t={id:uid('task'),title:val('qt_title'),type:val('qt_type'),category:val('qt_type'),priority:val('qt_priority'),dueDate:val('qt_due'),status:val('qt_status'),big3:false,notes:val('qt_notes'),completed:false,createdAt:todayISO()}; if(!t.title)return alert('Please enter a task title.'); state.tasks.unshift(t); save(); render()};
window.toggleBig3=id=>{state.tasks=state.tasks.map(t=>t.id===id?{...t,big3:!t.big3}:t);save();render()}; window.completeTask=id=>{state.tasks=state.tasks.map(t=>t.id===id?{...t,completed:true,status:'Done',completedAt:todayISO(),big3:false}:t);save();render()}; window.deleteTask=id=>{if(confirm('Delete this task?')){state.tasks=state.tasks.filter(t=>t.id!==id);save();render()}};
window.addPursuit=()=>{const p={id:uid('pursuit'),opportunity:val('p_opportunity'),architectClient:val('p_architect'),developerClient:val('p_developer'),projectType:val('p_type'),constructionCost:num('p_cost'),proposedFee:num('p_fee'),probability:num('p_prob'),proposalDueDate:val('p_due'),expectedStartDate:val('p_start'),revenueTiming:val('p_rev'),status:val('p_status'),nextAction:val('p_next'),notes:val('p_notes')}; if(!p.opportunity)return alert('Please enter an opportunity name.'); state.pursuits.unshift(p);save();render()}; window.deletePursuit=id=>{if(confirm('Delete this pursuit?')){state.pursuits=state.pursuits.filter(p=>p.id!==id);save();render()}};
window.addRelationship=()=>{const r={id:uid('rel'),name:val('r_name'),company:val('r_company'),role:val('r_role'),type:val('r_type'),status:val('r_status'),lastContactDate:val('r_last'),nextContactDate:val('r_next'),notes:val('r_notes')}; if(!r.name)return alert('Please enter a name.'); state.relationships.unshift(r);save();render()}; window.deleteRelationship=id=>{if(confirm('Delete this relationship?')){state.relationships=state.relationships.filter(r=>r.id!==id);save();render()}};
window.addWaiting=()=>{const w={id:uid('wait'),person:val('w_person'),company:val('w_company'),item:val('w_item'),related:val('w_related'),lastContactDate:val('w_last'),followUpDate:val('w_follow'),status:val('w_status'),notes:val('w_notes')}; if(!w.item)return alert('Please enter the item you are waiting on.'); state.waiting.unshift(w);save();render()}; window.deleteWaiting=id=>{if(confirm('Delete this waiting-on item?')){state.waiting=state.waiting.filter(w=>w.id!==id);save();render()}};
window.addMeeting=()=>{const m={id:uid('meet'),title:val('m_title'),date:val('m_date'),time:val('m_time'),attendees:val('m_attendees'),related:val('m_related'),prepNeeded:val('m_prep'),followUpNeeded:val('m_follow')==='true',notes:val('m_notes')}; if(!m.title)return alert('Please enter a meeting title.'); state.meetings.unshift(m);save();render()}; window.deleteMeeting=id=>{if(confirm('Delete this meeting?')){state.meetings=state.meetings.filter(m=>m.id!==id);save();render()}};
window.updateStatus=(kind,id,status)=>{if(kind==='pursuit')state.pursuits=state.pursuits.map(p=>p.id===id?{...p,status,probability:status==='Won'?100:(['Lost','Dead'].includes(status)?0:p.probability)}:p); if(kind==='relationship')state.relationships=state.relationships.map(r=>r.id===id?{...r,status}:r); if(kind==='waiting')state.waiting=state.waiting.map(w=>w.id===id?{...w,status}:w);save();render()};
window.saveWeekly=()=>{state.weekly={outcomes:val('week_outcomes'),mondayBig3:val('week_big3')};save();render()};
window.exportData=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='focusflow-v6-backup-'+todayISO()+'.json';a.click()};
window.importData=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{state={...sample,...JSON.parse(r.result)};save();render()}catch(err){alert('Could not import backup.')}}; r.readAsText(f)}; window.resetData=()=>{if(confirm('Reset to sample data? This will overwrite current local data. Export a backup first if needed.')){state=sample;save();render()}};
function val(id){const el=document.getElementById(id);return el?el.value.trim():''} function num(id){return Number(val(id)||0)}
render();
})();
</script>
</body>
</html>
