<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow V7</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--ink:#132033;--muted:#667085;--line:#d8dee9;--blue:#2563eb;--green:#15803d;--red:#b91c1c;--gray:#6b7280;--amber:#b45309;--shadow:0 8px 24px rgba(15,23,42,.08)}
    body.dark{--bg:#0f172a;--panel:#111827;--ink:#f8fafc;--muted:#a3aab8;--line:#334155;--blue:#60a5fa;--green:#4ade80;--red:#f87171;--gray:#9ca3af;--amber:#fbbf24;--shadow:0 8px 24px rgba(0,0,0,.35)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif} button,input,select,textarea{font:inherit} button{cursor:pointer}
    .app{display:grid;grid-template-columns:285px 1fr;min-height:100vh}.side{background:var(--panel);border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-weight:800;font-size:24px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.nav{margin-top:24px;display:grid;gap:8px}.nav button{border:0;background:transparent;color:var(--ink);text-align:left;padding:11px 12px;border-radius:12px}.nav button.active,.primary{background:var(--blue);color:#fff}.main{padding:24px;overflow:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:20px}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(180px,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.kpi .label{color:var(--muted);font-size:13px}.kpi .value{font-size:28px;font-weight:800;margin-top:7px}.green{color:var(--green)}.red{color:var(--red)}.gray{color:var(--gray)}.amber{color:var(--amber)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:9px 12px;border-radius:11px}.btn.primary{border-color:var(--blue)}.btn.danger{border-color:#fecaca;color:var(--red)}.btn.small{padding:5px 8px;font-size:12px}.form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.form.two{grid-template-columns:repeat(2,1fr)} input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:11px;padding:10px} textarea{min-height:84px;resize:vertical}.full{grid-column:1/-1}.section{margin-bottom:18px}.section h2{margin:0 0 12px}.section h3{margin:0 0 10px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);font-weight:700}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;background:#eef2ff;color:#3730a3}.pill.won{background:#dcfce7;color:#166534}.pill.lost{background:#fee2e2;color:#991b1b}.pill.dead{background:#e5e7eb;color:#374151}.pill.p1{background:#fee2e2;color:#991b1b}.pill.p2{background:#ffedd5;color:#9a3412}.pill.p3{background:#dbeafe;color:#1d4ed8}.pill.p4{background:#f3f4f6;color:#374151}.muted{color:var(--muted)}.hidden{display:none!important}
    .agenda{display:grid;grid-template-columns:90px 1fr;gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel)}.timecell{border-bottom:1px solid var(--line);padding:8px 10px;color:var(--muted);font-size:12px;min-height:46px}.slot{border-bottom:1px solid var(--line);padding:7px 10px;min-height:46px}.meeting{border-left:4px solid var(--blue);background:rgba(37,99,235,.09);border-radius:10px;padding:7px 9px;margin-bottom:6px}.free{color:var(--muted);font-size:12px}.printbox{white-space:pre-wrap;line-height:1.45;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
    @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}.main{padding:14px}}
    @media print{.side,.top,.no-print,.btn{display:none!important}.app{display:block}.main{padding:0}.card{box-shadow:none;border:0}.printbox{border:0}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">FocusFlow V7</div><div class="sub">KPFF Principal Operating System</div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="top"><div><h1 id="pageTitle">Dashboard</h1><div class="muted" id="pageSub">Principal dashboard and daily execution.</div></div><div class="row no-print"><button class="btn" onclick="toggleDark()">Dark Mode</button><button class="btn" onclick="downloadBackup()">Export Backup</button><label class="btn">Import Backup<input type="file" accept="application/json" onchange="importBackup(event)" hidden></label></div></div>
    <div id="view"></div>
  </main>
</div>
<script>
const STORAGE_KEY='focusflow_master_database_v1';
const OLD_KEYS=['focusflow_v6','focusflow_v5','focusflow_v4','focusflow_data','focusflow_tasks','focusflow'];
const todayISO=()=>new Date().toISOString().slice(0,10);
const money=n=>'$'+Number(n||0).toLocaleString();
const dateLabel=d=>d?new Date(d+'T00:00:00').toLocaleDateString():'';
const uid=p=>p+'_'+Math.random().toString(36).slice(2,10);
const hourLabel=h=>{let ap=h>=12?'PM':'AM', x=h%12||12; return x+':00 '+ap};
const seed={version:7,settings:{dark:false},tasks:[{id:uid('task'),title:'Finalize priority proposal scope',type:'Proposal Action',priority:'P1',dueDate:todayISO(),status:'Today',big3:true,notes:'Sample task. Edit or delete.',completed:false}],pursuits:[{id:uid('pursuit'),opportunity:'510 N Gay St Mixed-Use',architectClient:'MHM',developerClient:'TBD',client:'MHM',projectType:'5-over-2 podium',estimatedCost:50000000,proposedFee:295000,probability:60,proposalDueDate:todayISO(),expectedStartDate:'2026-08-01',revenueTiming:'Q3 2026',status:'Proposal Due',nextAction:'Confirm fee strategy',notes:'Sample pursuit.'}],relationships:[{id:uid('rel'),name:'Greg Buccola',company:'KPFF Latitude',type:'Internal',status:'Active',lastContactDate:todayISO(),nextContactDate:todayISO(),notes:'Sample relationship note.'}],waiting:[{id:uid('wait'),person:'Architect PM',company:'Client',item:'Confirm proposal due date',related:'Sample pursuit',lastContactDate:todayISO(),followUpDate:todayISO(),status:'Waiting',notes:''}],meetings:[{id:uid('meet'),title:'Proposal review call',date:todayISO(),time:'09:00',duration:60,attendees:'Architect, KPFF',related:'Sample pursuit',prepNeeded:'Review assumptions',followUpNeeded:true,notes:'Sample meeting.'}]};
function normalize(db){db=db||{}; return {version:7,settings:{dark:false,...db.settings},tasks:Array.isArray(db.tasks)?db.tasks:[],pursuits:Array.isArray(db.pursuits)?db.pursuits:[],relationships:Array.isArray(db.relationships)?db.relationships:[],waiting:Array.isArray(db.waiting)?db.waiting:[],meetings:Array.isArray(db.meetings)?db.meetings:[]};}
function load(){let raw=localStorage.getItem(STORAGE_KEY); if(raw){try{return normalize(JSON.parse(raw))}catch(e){}}
 for(const k of OLD_KEYS){raw=localStorage.getItem(k); if(raw){try{let old=JSON.parse(raw); let db=normalize(old); save(db); return db}catch(e){}}}
 save(seed); return structuredClone(seed)}
let db=load(); if(db.settings.dark)document.body.classList.add('dark');
function save(x=db){localStorage.setItem(STORAGE_KEY,JSON.stringify(x)); localStorage.setItem('focusflow_last_autosave',new Date().toISOString());}
const views=['Dashboard','Today','Proposal Pipeline','Relationships','Tasks','Waiting On','Meetings','Weekly Review','Backup']; let current='Dashboard';
function renderNav(){nav.innerHTML=views.map(v=>`<button class="${v===current?'active':''}" onclick="go('${v}')">${v}</button>`).join('')}
function go(v){current=v; render()}
function render(){renderNav(); pageTitle.textContent=current; pageSub.textContent=current==='Dashboard'?'Business health, execution health, relationships, and schedule.':'Manage '+current.toLowerCase()+'.'; const fn={Dashboard:dash,Today:todayView,'Proposal Pipeline':pursuitsView,Relationships:relationshipsView,Tasks:tasksView,'Waiting On':waitingView,Meetings:meetingsView,'Weekly Review':weeklyView,Backup:backupView}[current]; view.innerHTML=fn(); attachForms();}
function kpis(){const active=db.pursuits.filter(p=>!['Won','Lost','Dead'].includes(p.status)); const won=db.pursuits.filter(p=>p.status==='Won').reduce((a,p)=>a+Number(p.proposedFee||0),0); const lost=db.pursuits.filter(p=>p.status==='Lost').reduce((a,p)=>a+Number(p.proposedFee||0),0); const dead=db.pursuits.filter(p=>p.status==='Dead').reduce((a,p)=>a+Number(p.proposedFee||0),0); return {pipeline:active.reduce((a,p)=>a+Number(p.proposedFee||0),0),weighted:active.reduce((a,p)=>a+Number(p.proposedFee||0)*Number(p.probability||0)/100,0),won,lost,dead,open:db.tasks.filter(t=>!t.completed).length,overdue:db.tasks.filter(t=>!t.completed&&t.dueDate&&t.dueDate<todayISO()).length,followups:db.waiting.filter(w=>w.status!=='Resolved'&&w.followUpDate<=todayISO()).length,meetings:db.meetings.filter(m=>m.date===todayISO()).length}}
function dash(){const k=kpis(); return `<div class="grid cards section"><div class="card kpi"><div class="label">Pipeline Total</div><div class="value">${money(k.pipeline)}</div></div><div class="card kpi"><div class="label">Weighted Pipeline</div><div class="value">${money(k.weighted)}</div></div><div class="card kpi"><div class="label green">Fee Won</div><div class="value green">${money(k.won)}</div></div><div class="card kpi"><div class="label red">Fee Lost</div><div class="value red">${money(k.lost)}</div></div><div class="card kpi"><div class="label gray">Fee Dead</div><div class="value gray">${money(k.dead)}</div></div><div class="card kpi"><div class="label">Open Actions</div><div class="value">${k.open}</div></div><div class="card kpi"><div class="label red">Overdue</div><div class="value red">${k.overdue}</div></div><div class="card kpi"><div class="label amber">Follow-Ups Due</div><div class="value amber">${k.followups}</div></div></div><div class="grid" style="grid-template-columns:1.2fr .8fr"><div class="card"><h2>Today Agenda</h2>${agendaHTML(todayISO())}</div><div class="card"><h2>Today's Big 3</h2>${taskTable(db.tasks.filter(t=>t.big3&&!t.completed).slice(0,3))}</div></div><div class="card section"><h2>Proposal Pipeline Snapshot</h2>${pursuitTable(db.pursuits.slice(0,8))}</div>`}
function todayView(){return `<div class="grid" style="grid-template-columns:1.1fr .9fr"><div class="card"><h2>Today Agenda</h2>${agendaHTML(todayISO())}</div><div class="card"><h2>Due Today</h2>${taskTable(db.tasks.filter(t=>!t.completed&&t.dueDate===todayISO()))}<h2 style="margin-top:22px">Follow-Ups Due</h2>${waitingTable(db.waiting.filter(w=>w.status!=='Resolved'&&w.followUpDate<=todayISO()))}</div></div>`}
function pursuitStatusClass(s){return s==='Won'?'won':s==='Lost'?'lost':s==='Dead'?'dead':''}
function pursuitTable(rows){if(!rows.length)return '<p class="muted">No pursuits yet.</p>'; return `<table class="table"><tr><th>Opportunity</th><th>Architect Client</th><th>Developer Client</th><th>Fee</th><th>Prob.</th><th>Weighted</th><th>Due</th><th>Status</th><th>Next Action</th><th></th></tr>${rows.map(p=>`<tr><td>${p.opportunity||''}</td><td>${p.architectClient||''}</td><td>${p.developerClient||''}</td><td>${money(p.proposedFee)}</td><td>${p.probability||0}%</td><td>${money(Number(p.proposedFee||0)*Number(p.probability||0)/100)}</td><td>${dateLabel(p.proposalDueDate)}</td><td><select onchange="update('pursuits','${p.id}','status',this.value)"><option ${p.status==='Lead'?'selected':''}>Lead</option><option ${p.status==='Proposal Due'?'selected':''}>Proposal Due</option><option ${p.status==='Submitted'?'selected':''}>Submitted</option><option ${p.status==='Won'?'selected':''}>Won</option><option ${p.status==='Lost'?'selected':''}>Lost</option><option ${p.status==='Dead'?'selected':''}>Dead</option></select><div style="margin-top:5px"><span class="pill ${pursuitStatusClass(p.status)}">${p.status||'Lead'}</span></div></td><td>${p.nextAction||''}</td><td><button class="btn small danger" onclick="del('pursuits','${p.id}')">Delete</button></td></tr>`).join('')}</table>`}
function pursuitsView(){return `<div class="card section"><h2>Add Pursuit</h2><form id="pursuitForm" class="form"><input name="opportunity" placeholder="Opportunity"><input name="architectClient" placeholder="Architect Client"><input name="developerClient" placeholder="Developer Client"><input name="projectType" placeholder="Project Type"><input name="estimatedCost" type="number" placeholder="Construction Cost"><input name="proposedFee" type="number" placeholder="Proposed Fee"><input name="probability" type="number" placeholder="Win Probability %"><input name="proposalDueDate" type="date" title="Proposal Due Date"><input name="expectedStartDate" type="date" title="Expected Start Date"><input name="revenueTiming" placeholder="Revenue Timing, e.g. Q3 2026"><select name="status"><option>Lead</option><option>Proposal Due</option><option>Submitted</option><option>Won</option><option>Lost</option><option>Dead</option></select><input name="nextAction" placeholder="Next Action"><textarea class="full" name="notes" placeholder="Notes"></textarea><button class="btn primary" type="submit">Add Pursuit</button></form></div><div class="card"><h2>Pipeline</h2>${pursuitTable(db.pursuits)}</div>`}
function relationshipTable(rows){if(!rows.length)return '<p class="muted">No relationships yet.</p>'; return `<table class="table"><tr><th>Name</th><th>Company</th><th>Type</th><th>Status</th><th>Last Contact</th><th>Next Contact</th><th>Notes</th><th></th></tr>${rows.map(r=>`<tr><td>${r.name||''}</td><td>${r.company||''}</td><td>${r.type||''}</td><td><select onchange="update('relationships','${r.id}','status',this.value)"><option ${r.status==='Active'?'selected':''}>Active</option><option ${r.status==='Follow Up'?'selected':''}>Follow Up</option><option ${r.status==='Dormant'?'selected':''}>Dormant</option><option ${r.status==='Do Not Contact'?'selected':''}>Do Not Contact</option></select></td><td>${dateLabel(r.lastContactDate)}</td><td>${dateLabel(r.nextContactDate)}</td><td>${r.notes||''}</td><td><button class="btn small danger" onclick="del('relationships','${r.id}')">Delete</button></td></tr>`).join('')}</table>`}
function relationshipsView(){return `<div class="card section"><h2>Add Relationship</h2><form id="relForm" class="form"><input name="name" placeholder="Name"><input name="company" placeholder="Company"><select name="type"><option>Architect Client</option><option>Developer Client</option><option>Owner</option><option>Internal</option><option>Consultant</option><option>Other</option></select><select name="status"><option>Active</option><option>Follow Up</option><option>Dormant</option><option>Do Not Contact</option></select><label>Last Contact Date<input name="lastContactDate" type="date"></label><label>Next Contact Date<input name="nextContactDate" type="date"></label><textarea class="full" name="notes" placeholder="Relationship notes visible in summary board"></textarea><button class="btn primary" type="submit">Add Relationship</button></form></div><div class="card"><h2>Relationship Board</h2>${relationshipTable(db.relationships)}</div>`}
function taskTable(rows){if(!rows.length)return '<p class="muted">No tasks.</p>';return `<table class="table"><tr><th>Task</th><th>Type</th><th>Priority</th><th>Task Due Date</th><th>Status</th><th>Big 3</th><th></th></tr>${rows.map(t=>`<tr><td>${t.title}</td><td>${t.type||''}</td><td><span class="pill ${(t.priority||'P4').toLowerCase()}">${t.priority||''}</span></td><td>${dateLabel(t.dueDate)}</td><td><select onchange="update('tasks','${t.id}','status',this.value)"><option ${t.status==='Today'?'selected':''}>Today</option><option ${t.status==='This Week'?'selected':''}>This Week</option><option ${t.status==='Waiting'?'selected':''}>Waiting</option><option ${t.status==='Someday'?'selected':''}>Someday</option><option ${t.status==='Done'?'selected':''}>Done</option></select></td><td><input type="checkbox" ${t.big3?'checked':''} onchange="update('tasks','${t.id}','big3',this.checked)"></td><td><button class="btn small" onclick="completeTask('${t.id}')">Done</button> <button class="btn small danger" onclick="del('tasks','${t.id}')">Delete</button></td></tr>`).join('')}</table>`}
function tasksView(){return `<div class="card section"><h2>Add Task</h2><form id="taskForm" class="form"><input name="title" placeholder="Task / Action Item"><select name="type"><option>Task</option><option>Project Action</option><option>Proposal Action</option><option>Follow-Up</option><option>Meeting Action</option><option>Personal</option></select><select name="priority"><option>P1</option><option>P2</option><option>P3</option><option>P4</option></select><label>Task Due Date<input name="dueDate" type="date"></label><select name="status"><option>Today</option><option>This Week</option><option>Waiting</option><option>Someday</option></select><label class="row"><input name="big3" type="checkbox"> Add to Big 3</label><textarea class="full" name="notes" placeholder="Notes"></textarea><button class="btn primary" type="submit">Add Task</button></form></div><div class="card"><h2>Tasks</h2>${taskTable(db.tasks.filter(t=>!t.completed))}</div>`}
function waitingTable(rows){if(!rows.length)return '<p class="muted">No waiting-on items.</p>'; return `<table class="table"><tr><th>Person</th><th>Company</th><th>Item</th><th>Last Contact</th><th>Follow-Up</th><th>Status</th><th></th></tr>${rows.map(w=>`<tr><td>${w.person}</td><td>${w.company||''}</td><td>${w.item}</td><td>${dateLabel(w.lastContactDate)}</td><td>${dateLabel(w.followUpDate)}</td><td><select onchange="update('waiting','${w.id}','status',this.value)"><option ${w.status==='Waiting'?'selected':''}>Waiting</option><option ${w.status==='Follow Up Today'?'selected':''}>Follow Up Today</option><option ${w.status==='Resolved'?'selected':''}>Resolved</option><option ${w.status==='Dropped'?'selected':''}>Dropped</option></select></td><td><button class="btn small danger" onclick="del('waiting','${w.id}')">Delete</button></td></tr>`).join('')}</table>`}
function waitingView(){return `<div class="card section"><h2>Add Waiting-On Item</h2><form id="waitForm" class="form"><input name="person" placeholder="Person"><input name="company" placeholder="Company"><input name="item" placeholder="What am I waiting on?"><input name="related" placeholder="Related project/pursuit"><label>Last Contact Date<input name="lastContactDate" type="date"></label><label>Follow-Up Date<input name="followUpDate" type="date"></label><select name="status"><option>Waiting</option><option>Follow Up Today</option><option>Resolved</option><option>Dropped</option></select><textarea class="full" name="notes" placeholder="Notes"></textarea><button class="btn primary" type="submit">Add Waiting Item</button></form></div><div class="card"><h2>Waiting On</h2>${waitingTable(db.waiting)}</div>`}
function sortedMeetings(date){return db.meetings.filter(m=>m.date===date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));}
function agendaHTML(date){let ms=sortedMeetings(date); let byHour={}; ms.forEach(m=>{let h=Number((m.time||'00:00').slice(0,2)); (byHour[h]||(byHour[h]=[])).push(m)}); return `<div class="agenda">${Array.from({length:17},(_,i)=>i+5).map(h=>`<div class="timecell">${hourLabel(h)}</div><div class="slot">${(byHour[h]||[]).map(m=>`<div class="meeting"><b>${m.time}</b> (${m.duration||30} min) ${m.title}<div class="muted">${m.attendees||''}</div></div>`).join('')||'<span class="free">Open / Focus Time</span>'}</div>`).join('')}</div>`}
function meetingsView(){return `<div class="card section"><h2>Add Meeting</h2><form id="meetForm" class="form"><input name="title" placeholder="Meeting Title"><label>Meeting Date<input name="date" type="date"></label><label>Start Time<input name="time" type="time"></label><label>Duration (minutes)<input name="duration" type="number" value="30"></label><input name="attendees" placeholder="Attendees"><input name="related" placeholder="Related project/pursuit"><input name="prepNeeded" placeholder="Prep Needed"><label class="row"><input name="followUpNeeded" type="checkbox"> Follow-up needed</label><textarea class="full" name="notes" placeholder="Notes"></textarea><button class="btn primary" type="submit">Add Meeting</button></form></div><div class="grid" style="grid-template-columns:1fr 1fr"><div class="card"><h2>Daily Agenda: ${dateLabel(todayISO())}</h2>${agendaHTML(todayISO())}</div><div class="card"><h2>Meeting List</h2>${meetingTable(db.meetings.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)))}</div></div>`}
function meetingTable(rows){if(!rows.length)return '<p class="muted">No meetings.</p>'; return `<table class="table"><tr><th>Date</th><th>Time</th><th>Duration</th><th>Title</th><th>Prep</th><th></th></tr>${rows.map(m=>`<tr><td>${dateLabel(m.date)}</td><td>${m.time}</td><td>${m.duration||30} min</td><td>${m.title}</td><td>${m.prepNeeded||''}</td><td><button class="btn small danger" onclick="del('meetings','${m.id}')">Delete</button></td></tr>`).join('')}</table>`}
function weeklyText(){const k=kpis();return `FOCUSFLOW WEEKLY PLAN\n\nBusiness Health\nPipeline Total: ${money(k.pipeline)}\nWeighted Pipeline: ${money(k.weighted)}\nFee Won: ${money(k.won)}\nFee Lost: ${money(k.lost)}\nFee Dead: ${money(k.dead)}\n\nNext Week Big Outcomes\n1. \n2. \n3. \n\nProposal Priorities\n${db.pursuits.filter(p=>!['Won','Lost','Dead'].includes(p.status)).slice(0,6).map(p=>'- '+p.opportunity+' | '+money(p.proposedFee)+' | Due '+dateLabel(p.proposalDueDate)).join('\n')}\n\nProject / Task Priorities\n${db.tasks.filter(t=>!t.completed).slice(0,8).map(t=>'- '+t.title+' | Due '+dateLabel(t.dueDate)).join('\n')}\n\nRelationship / Follow-Up Priorities\n${db.relationships.slice(0,8).map(r=>'- '+r.name+' | '+r.company+' | Next '+dateLabel(r.nextContactDate)+' | '+(r.notes||'')).join('\n')}\n`;}
function weeklyView(){return `<div class="card"><h2>Printable Weekly Plan</h2><p class="muted">Use your browser Print command to print or save as PDF.</p><button class="btn primary no-print" onclick="window.print()">Print / Save PDF</button><div class="printbox">${weeklyText()}</div></div>`}
function backupView(){return `<div class="card"><h2>Backup Database</h2><p>This app is static on GitHub Pages, so the durable database is your browser's saved local database plus JSON backups. V7 uses a stable storage key so future version updates should preserve data on the same URL/browser.</p><p><b>Storage key:</b> ${STORAGE_KEY}</p><p><b>Last autosave:</b> ${localStorage.getItem('focusflow_last_autosave')||'Just now'}</p><div class="row"><button class="btn primary" onclick="downloadBackup()">Download Backup JSON</button><label class="btn">Restore From Backup<input type="file" accept="application/json" onchange="importBackup(event)" hidden></label><button class="btn danger" onclick="if(confirm('Reset all FocusFlow data?')){db=structuredClone(seed);save();render();}">Reset Sample Data</button></div></div>`}
function attachForms(){const bind=(id,arr,mapper)=>{let f=document.getElementById(id); if(!f)return; f.onsubmit=e=>{e.preventDefault(); let fd=new FormData(f); db[arr].push(mapper(fd)); save(); render();}}; bind('taskForm','tasks',fd=>({id:uid('task'),title:fd.get('title'),type:fd.get('type'),priority:fd.get('priority'),dueDate:fd.get('dueDate'),status:fd.get('status'),big3:!!fd.get('big3'),notes:fd.get('notes'),completed:false})); bind('pursuitForm','pursuits',fd=>({id:uid('pursuit'),opportunity:fd.get('opportunity'),architectClient:fd.get('architectClient'),developerClient:fd.get('developerClient'),projectType:fd.get('projectType'),estimatedCost:+fd.get('estimatedCost'),proposedFee:+fd.get('proposedFee'),probability:+fd.get('probability'),proposalDueDate:fd.get('proposalDueDate'),expectedStartDate:fd.get('expectedStartDate'),revenueTiming:fd.get('revenueTiming'),status:fd.get('status'),nextAction:fd.get('nextAction'),notes:fd.get('notes')})); bind('relForm','relationships',fd=>({id:uid('rel'),name:fd.get('name'),company:fd.get('company'),type:fd.get('type'),status:fd.get('status'),lastContactDate:fd.get('lastContactDate'),nextContactDate:fd.get('nextContactDate'),notes:fd.get('notes')})); bind('waitForm','waiting',fd=>({id:uid('wait'),person:fd.get('person'),company:fd.get('company'),item:fd.get('item'),related:fd.get('related'),lastContactDate:fd.get('lastContactDate'),followUpDate:fd.get('followUpDate'),status:fd.get('status'),notes:fd.get('notes')})); bind('meetForm','meetings',fd=>({id:uid('meet'),title:fd.get('title'),date:fd.get('date'),time:fd.get('time'),duration:+fd.get('duration'),attendees:fd.get('attendees'),related:fd.get('related'),prepNeeded:fd.get('prepNeeded'),followUpNeeded:!!fd.get('followUpNeeded'),notes:fd.get('notes')}));}
function update(arr,id,key,val){let x=db[arr].find(i=>i.id===id); if(x){x[key]=val; if(arr==='tasks'&&key==='status'&&val==='Done'){x.completed=true;x.completedAt=todayISO()} save(); render();}}
function del(arr,id){if(confirm('Delete this item?')){db[arr]=db[arr].filter(i=>i.id!==id);save();render();}}
function completeTask(id){let t=db.tasks.find(x=>x.id===id); if(t){t.completed=true;t.status='Done';t.completedAt=todayISO();save();render();}}
function toggleDark(){document.body.classList.toggle('dark');db.settings.dark=document.body.classList.contains('dark');save();}
function downloadBackup(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='focusflow-backup-'+todayISO()+'.json'; a.click(); URL.revokeObjectURL(a.href)}
function importBackup(e){const file=e.target.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>{try{db=normalize(JSON.parse(r.result));save();render();alert('Backup restored.')}catch(err){alert('Could not import backup file.')}}; r.readAsText(file)}
render();
</script>
</body>
</html>
