<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow v2</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#ffffff; --panel2:#f8fafc; --text:#0f172a; --muted:#64748b;
      --line:#e5e7eb; --brand:#0f172a; --brandText:#ffffff; --shadow:0 16px 40px rgba(15,23,42,.08);
      --red:#ef4444; --orange:#f97316; --blue:#2563eb; --green:#16a34a; --purple:#7c3aed;
      --pill:#eef2ff;
    }
    body.dark{
      --bg:#0b1220; --panel:#111827; --panel2:#172033; --text:#e5e7eb; --muted:#9ca3af;
      --line:#263244; --brand:#e5e7eb; --brandText:#0b1220; --shadow:0 16px 40px rgba(0,0,0,.32);
      --pill:#1f2937;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:300px 1fr;gap:24px;max-width:1600px;margin:0 auto;padding:28px}
    .side{display:flex;flex-direction:column;gap:18px;position:sticky;top:20px;height:calc(100vh - 40px)}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .brand{padding:24px}.brand h1{font-size:34px;margin:0 0 6px}.brand p{margin:0;color:var(--muted)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}.stat{background:var(--panel2);border-radius:14px;padding:14px;text-align:center}.stat b{font-size:22px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
    .nav{padding:12px;overflow:auto}.nav button{width:100%;display:flex;justify-content:space-between;align-items:center;border:0;background:transparent;color:var(--text);padding:12px 14px;border-radius:13px;cursor:pointer;text-align:left}.nav button.active{background:var(--brand);color:var(--brandText)}.nav small{color:inherit;opacity:.7}
    .backup{display:grid;gap:10px;padding:14px}.btn{border:0;border-radius:14px;padding:12px 16px;background:var(--brand);color:var(--brandText);font-weight:700;cursor:pointer}.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.btn.danger{background:#fee2e2;color:#b91c1c}.btn.good{background:#dcfce7;color:#166534}.btn.small{padding:8px 11px;border-radius:10px;font-size:13px}
    main{min-width:0}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.topbar h2{font-size:34px;margin:0 0 6px}.topbar p{margin:0;color:var(--muted)}.search{min-width:320px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;color:var(--text)}
    .metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}.metric{padding:18px}.metric .label{color:var(--muted);font-size:13px}.metric .value{font-size:30px;font-weight:800;margin-top:8px}.metric.red .value{color:var(--red)}.metric.orange .value{color:var(--orange)}.metric.blue .value{color:var(--blue)}.metric.green .value{color:var(--green)}.metric.purple .value{color:var(--purple)}
    .big3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}.bigcard{padding:18px;min-height:122px}.bigcard small{color:var(--muted);font-weight:800}.bigcard p{font-weight:800;font-size:17px;line-height:1.25}.empty{color:var(--muted);font-weight:400!important}
    .capture{padding:20px;margin-bottom:22px}.capture h3,.section h3{margin:0 0 14px;font-size:22px}.grid{display:grid;gap:12px}.task-grid{grid-template-columns:1.4fr 160px 125px 150px 135px 160px auto}.proposal-grid{grid-template-columns:1.1fr 150px 140px 145px 1fr auto}.waiting-grid{grid-template-columns:1.5fr 170px 150px 1fr auto}input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:14px;padding:13px 14px;outline:none}textarea{min-height:82px;resize:vertical}
    .section{padding:20px;margin-bottom:22px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.hint{color:var(--muted);font-size:14px;margin:0}
    .tasks{display:grid;gap:10px}.task{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:17px;padding:14px}.check{width:23px;height:23px;border:2px solid #334155;border-radius:50%;background:transparent;cursor:pointer}.done .title{text-decoration:line-through;color:var(--muted)}.meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px;margin-top:7px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;background:var(--pill)}.p1{background:#fee2e2;color:#b91c1c}.p2{background:#ffedd5;color:#c2410c}.p3{background:#dbeafe;color:#1d4ed8}.p4{background:#e2e8f0;color:#334155}.big{background:#dcfce7;color:#166534}.status{background:#ede9fe;color:#6d28d9}.row-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .bucket-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.bucket{background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:12px;min-height:180px}.bucket h4{margin:0 0 10px}.mini{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:10px;margin-bottom:8px}.mini b{font-size:14px}.mini p{margin:4px 0 0;color:var(--muted);font-size:12px}
    table{width:100%;border-collapse:separate;border-spacing:0 9px}th{text-align:left;color:var(--muted);font-size:13px;font-weight:800}td{background:var(--panel2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px;vertical-align:top}td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.mobile-only{display:none}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal.open{display:flex}.modal-box{width:min(760px,100%);background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:22px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.modal-head h3{margin:0;font-size:24px}.x{border:0;background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 11px;cursor:pointer}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.side{position:static;height:auto}.metrics{grid-template-columns:repeat(2,1fr)}.big3,.bucket-wrap{grid-template-columns:1fr}.task-grid,.proposal-grid,.waiting-grid{grid-template-columns:1fr}.topbar{flex-direction:column}.search{min-width:0;width:100%}table,thead,tbody,tr,td,th{display:block}thead{display:none}td{border:1px solid var(--line);border-bottom:0;border-radius:0!important}td:first-child{border-radius:14px 14px 0 0!important}td:last-child{border-bottom:1px solid var(--line);border-radius:0 0 14px 14px!important}.mobile-only{display:inline;color:var(--muted);font-size:12px;font-weight:800}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="card brand">
        <h1>FocusFlow</h1><p>Seller-doer command center</p>
        <div class="stats"><div class="stat"><b id="openCount">0</b><span>Open</span></div><div class="stat"><b id="todayCount">0</b><span>Today</span></div><div class="stat"><b id="doneCount">0</b><span>Done</span></div></div>
      </div>
      <div class="card nav" id="nav"></div>
      <div class="card backup">
        <button class="btn secondary" onclick="toggleDark()">Toggle dark mode</button>
        <button class="btn secondary" onclick="exportBackup()">Export backup</button>
        <label class="btn secondary" style="text-align:center;cursor:pointer">Import backup<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label>
      </div>
    </aside>
    <main>
      <div class="topbar"><div><h2 id="viewTitle">Dashboard</h2><p id="viewSubtitle">Plan the day, manage pursuits, and keep follow-ups visible.</p></div><input class="search" id="search" placeholder="Search tasks, pursuits, waiting-on items" oninput="render()"></div>
      <div id="content"></div>
    </main>
  </div>
  <div class="modal" id="modal"><div class="modal-box"><div class="modal-head"><h3 id="modalTitle">Edit</h3><button class="x" onclick="closeModal()">Close</button></div><div id="modalBody"></div></div></div>
<script>
const STORE='focusflow_v2_data';
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const defaultData={
  settings:{dark:false,view:'Dashboard'},
  tasks:[
    {id:crypto.randomUUID(),title:'Finalize structural proposal for client review',project:'Proposals / Pursuits',priority:'P1',due:todayISO(),context:'Work',status:'Today',big3:true,completed:false,notes:''},
    {id:crypto.randomUUID(),title:'Review open RFIs on active projects',project:'Active Projects',priority:'P1',due:todayISO(),context:'Work',status:'Today',big3:true,completed:false,notes:''},
    {id:crypto.randomUUID(),title:'Call key client about upcoming pursuit',project:'Business Development',priority:'P2',due:addDays(3),context:'Work',status:'This Week',big3:true,completed:false,notes:''}
  ],
  waiting:[{id:crypto.randomUUID(),item:'Updated civil background for podium coordination',person:'Civil / Architect',due:addDays(2),project:'Active Projects',notes:'Follow up before weekly coordination call.',completed:false}],
  proposals:[{id:crypto.randomUUID(),opportunity:'Example mixed-use pursuit',architect:'Architect TBD',due:addDays(5),feeStatus:'Drafting',nextAction:'Confirm scope assumptions and fee range.',status:'Active'}]
};
let data=load();
function load(){try{return JSON.parse(localStorage.getItem(STORE))||defaultData}catch{return defaultData}}
function save(){localStorage.setItem(STORE,JSON.stringify(data));document.body.classList.toggle('dark',!!data.settings.dark)}
function fmt(d){if(!d)return 'No date'; const x=new Date(d+'T12:00:00'); return x.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}
function daysUntil(d){const a=new Date(todayISO()+'T00:00:00'),b=new Date(d+'T00:00:00');return Math.round((b-a)/86400000)}
function isThisWeek(d){const n=daysUntil(d);return n>=0&&n<=7}
function overdue(d){return d&&daysUntil(d)<0}
function navItems(){
  const open=data.tasks.filter(t=>!t.completed).length;
  return [
    ['Dashboard',open],['Today',data.tasks.filter(t=>!t.completed&&t.due===todayISO()).length],['Big 3',data.tasks.filter(t=>!t.completed&&t.big3).length],['This Week',data.tasks.filter(t=>!t.completed&&isThisWeek(t.due)).length],['Buckets',open],['Waiting On',data.waiting.filter(w=>!w.completed).length],['Proposal Tracker',data.proposals.filter(p=>p.status!=='Closed').length],['Weekly Review',''],['Completed',data.tasks.filter(t=>t.completed).length]
  ];
}
function setView(v){data.settings.view=v;save();render()}
function renderNav(){document.getElementById('nav').innerHTML=navItems().map(([n,c])=>`<button class="${data.settings.view===n?'active':''}" onclick="setView('${n}')"><span>${n}</span><small>${c}</small></button>`).join('')}
function counts(){document.getElementById('openCount').textContent=data.tasks.filter(t=>!t.completed).length;document.getElementById('todayCount').textContent=data.tasks.filter(t=>!t.completed&&t.due===todayISO()).length;document.getElementById('doneCount').textContent=data.tasks.filter(t=>t.completed).length}
function metric(label,value,cls=''){return `<div class="card metric ${cls}"><div class="label">${label}</div><div class="value">${value}</div></div>`}
function taskForm(){return `<div class="card capture"><h3>Quick Capture</h3><div class="grid task-grid"><input id="newTitle" placeholder="Add a task, action item, follow-up, or reminder..."><select id="newProject"><option>Inbox</option><option>Active Projects</option><option>Proposals / Pursuits</option><option>Business Development</option><option>KPFF Operations</option><option>Personal</option></select><select id="newPriority"><option>P1</option><option selected>P2</option><option>P3</option><option>P4</option></select><input type="date" id="newDue" value="${todayISO()}"><select id="newContext"><option>Work</option><option>Personal</option></select><select id="newStatus"><option>Today</option><option selected>This Week</option><option>Later</option><option>Someday</option></select><button class="btn" onclick="addTask()">Add</button></div></div>`}
function addTask(){const title=document.getElementById('newTitle').value.trim();if(!title)return;data.tasks.unshift({id:crypto.randomUUID(),title,project:val('newProject'),priority:val('newPriority'),due:val('newDue'),context:val('newContext'),status:val('newStatus'),big3:false,completed:false,notes:''});save();render()}
function val(id){return document.getElementById(id).value}
function filteredTasks(base){const q=document.getElementById('search').value.toLowerCase();return base.filter(t=>(t.title+' '+t.project+' '+t.notes).toLowerCase().includes(q)).sort((a,b)=>['P1','P2','P3','P4'].indexOf(a.priority)-['P1','P2','P3','P4'].indexOf(b.priority)||daysUntil(a.due)-daysUntil(b.due))}
function taskList(tasks,title='Tasks',hint='Click the circle to complete. Star a task to make it part of today’s Big 3.'){return `<div class="card section"><div class="section-head"><div><h3>${title}</h3><p class="hint">${hint}</p></div></div><div class="tasks">${tasks.length?tasks.map(taskHTML).join(''):'<div class="task"><div></div><div class="empty">Nothing here.</div><div></div></div>'}</div></div>`}
function taskHTML(t){return `<div class="task ${t.completed?'done':''}"><button class="check" onclick="toggleDone('${t.id}')"></button><div><div class="title"><b>${esc(t.title)}</b></div><div class="meta"><span>${esc(t.project)}</span><span>•</span><span>${fmt(t.due)}${overdue(t.due)?' - overdue':''}</span><span>•</span><span>${esc(t.context)}</span><span class="pill ${t.priority.toLowerCase()}">${t.priority}</span>${t.big3?'<span class="pill big">Big 3</span>':''}<span class="pill status">${esc(t.status)}</span></div>${t.notes?`<div class="meta">${esc(t.notes)}</div>`:''}</div><div class="row-actions"><button class="btn small good" onclick="toggleBig3('${t.id}')">★</button><button class="btn small secondary" onclick="editTask('${t.id}')">Edit</button><button class="btn small danger" onclick="delTask('${t.id}')">Delete</button></div></div>`}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toggleDone(id){const t=data.tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;if(t.completed)t.big3=false;save();render()}}
function toggleBig3(id){const t=data.tasks.find(x=>x.id===id);if(!t)return;if(t.big3){t.big3=false}else if(data.tasks.filter(x=>x.big3&&!x.completed).length<3){t.big3=true;t.due=todayISO();t.status='Today'}save();render()}
function delTask(id){if(confirm('Delete this task?')){data.tasks=data.tasks.filter(t=>t.id!==id);save();render()}}
function dashboard(){const open=data.tasks.filter(t=>!t.completed);const big=open.filter(t=>t.big3).slice(0,3);const overdueCount=open.filter(t=>overdue(t.due)).length;const pursuitWeek=data.proposals.filter(p=>p.status!=='Closed'&&isThisWeek(p.due)).length;const projectActions=open.filter(t=>t.project==='Active Projects').length;const waiting=data.waiting.filter(w=>!w.completed).length;return `<div class="metrics">${metric('Proposal deadlines this week',pursuitWeek,'blue')}${metric('Active project actions',projectActions,'purple')}${metric('Waiting on others',waiting,'orange')}${metric('Today’s Big 3',big.length,'green')}${metric('Overdue',overdueCount,'red')}</div><div class="big3">${[0,1,2].map(i=>`<div class="card bigcard"><small>Big 3 #${i+1}</small>${big[i]?`<p>${esc(big[i].title)}</p><div class="meta">${esc(big[i].project)} • ${fmt(big[i].due)}</div>`:'<p class="empty">Choose one essential task for today.</p>'}</div>`).join('')}</div>${taskForm()}${taskList(filteredTasks(open.filter(t=>t.due===todayISO())),'Today','Your execution list for today.')}${proposalTable()}${waitingTable()}`}
function buckets(){const open=filteredTasks(data.tasks.filter(t=>!t.completed));const statuses=['Today','This Week','Later','Someday'];return `<div class="card section"><h3>Priority Buckets</h3><p class="hint">Use Move buttons to triage tasks between buckets.</p><div class="bucket-wrap">${statuses.map(s=>`<div class="bucket"><h4>${s}</h4>${open.filter(t=>t.status===s).map(t=>`<div class="mini"><b>${esc(t.title)}</b><p>${t.priority} • ${fmt(t.due)}</p><div class="row-actions" style="justify-content:flex-start;margin-top:8px">${statuses.filter(x=>x!==s).map(x=>`<button class="btn small secondary" onclick="moveTask('${t.id}','${x}')">${x}</button>`).join('')}</div></div>`).join('')||'<p class="hint">Empty</p>'}</div>`).join('')}</div></div>`}
function moveTask(id,s){const t=data.tasks.find(x=>x.id===id);if(t){t.status=s;if(s==='Today')t.due=todayISO();save();render()}}
function proposalForm(){return `<div class="card capture"><h3>Add Proposal / Pursuit</h3><div class="grid proposal-grid"><input id="opp" placeholder="Opportunity / project"><input id="arch" placeholder="Architect / client"><input type="date" id="pDue" value="${addDays(7)}"><select id="fee"><option>Lead</option><option>Scoping</option><option selected>Drafting</option><option>Submitted</option><option>Won</option><option>Lost</option></select><input id="next" placeholder="Next action"><button class="btn" onclick="addProposal()">Add</button></div></div>`}
function addProposal(){if(!val('opp').trim())return;data.proposals.unshift({id:crypto.randomUUID(),opportunity:val('opp').trim(),architect:val('arch'),due:val('pDue'),feeStatus:val('fee'),nextAction:val('next'),status:'Active'});save();render()}
function proposalTable(){const q=document.getElementById('search').value.toLowerCase();const rows=data.proposals.filter(p=>(p.opportunity+' '+p.architect+' '+p.nextAction).toLowerCase().includes(q));return `<div class="card section"><div class="section-head"><h3>Proposal Tracker</h3><button class="btn small secondary" onclick="setView('Proposal Tracker')">Open tracker</button></div><table><thead><tr><th>Opportunity</th><th>Architect / Client</th><th>Due</th><th>Fee Status</th><th>Next Action</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr><td><span class="mobile-only">Opportunity: </span><b>${esc(p.opportunity)}</b></td><td>${esc(p.architect)}</td><td>${fmt(p.due)}${overdue(p.due)?' - overdue':''}</td><td><span class="pill status">${esc(p.feeStatus)}</span></td><td>${esc(p.nextAction)}</td><td><button class="btn small secondary" onclick="editProposal('${p.id}')">Edit</button></td></tr>`).join('')||'<tr><td colspan="6">No pursuits yet.</td></tr>'}</tbody></table></div>`}
function waitingForm(){return `<div class="card capture"><h3>Add Waiting On</h3><div class="grid waiting-grid"><input id="wItem" placeholder="What are you waiting on?"><input id="wPerson" placeholder="Person / company"><input type="date" id="wDue" value="${addDays(2)}"><input id="wNotes" placeholder="Notes / follow-up plan"><button class="btn" onclick="addWaiting()">Add</button></div></div>`}
function addWaiting(){if(!val('wItem').trim())return;data.waiting.unshift({id:crypto.randomUUID(),item:val('wItem').trim(),person:val('wPerson'),due:val('wDue'),project:'',notes:val('wNotes'),completed:false});save();render()}
function waitingTable(){const q=document.getElementById('search').value.toLowerCase();const rows=data.waiting.filter(w=>!w.completed&&(w.item+' '+w.person+' '+w.notes).toLowerCase().includes(q));return `<div class="card section"><div class="section-head"><h3>Waiting On</h3><button class="btn small secondary" onclick="setView('Waiting On')">Open list</button></div><table><thead><tr><th>Item</th><th>Waiting On</th><th>Follow Up</th><th>Notes</th><th></th></tr></thead><tbody>${rows.map(w=>`<tr><td><b>${esc(w.item)}</b></td><td>${esc(w.person)}</td><td>${fmt(w.due)}${overdue(w.due)?' - overdue':''}</td><td>${esc(w.notes)}</td><td><button class="btn small good" onclick="closeWaiting('${w.id}')">Done</button> <button class="btn small secondary" onclick="editWaiting('${w.id}')">Edit</button></td></tr>`).join('')||'<tr><td colspan="5">No waiting-on items.</td></tr>'}</tbody></table></div>`}
function closeWaiting(id){const w=data.waiting.find(x=>x.id===id);if(w){w.completed=true;save();render()}}
function weeklyReview(){const open=data.tasks.filter(t=>!t.completed);return `<div class="metrics">${metric('Overdue tasks',open.filter(t=>overdue(t.due)).length,'red')}${metric('Due this week',open.filter(t=>isThisWeek(t.due)).length,'blue')}${metric('Waiting on',data.waiting.filter(w=>!w.completed).length,'orange')}${metric('Pursuits due this week',data.proposals.filter(p=>p.status!=='Closed'&&isThisWeek(p.due)).length,'purple')}${metric('Completed',data.tasks.filter(t=>t.completed).length,'green')}</div>${taskList(filteredTasks(open.filter(t=>overdue(t.due))),'Overdue','Decide: do today, defer, delegate, or delete.')}${taskList(filteredTasks(open.filter(t=>isThisWeek(t.due))),'This Week','Pick what actually deserves attention this week.')}${waitingTable()}${proposalTable()}`}
function editTask(id){const t=data.tasks.find(x=>x.id===id);openModal('Edit Task',`<div class="grid"><input id="eTitle" value="${esc(t.title)}"><select id="eProject">${['Inbox','Active Projects','Proposals / Pursuits','Business Development','KPFF Operations','Personal'].map(x=>`<option ${x===t.project?'selected':''}>${x}</option>`).join('')}</select><select id="ePriority">${['P1','P2','P3','P4'].map(x=>`<option ${x===t.priority?'selected':''}>${x}</option>`).join('')}</select><input type="date" id="eDue" value="${t.due}"><select id="eStatus">${['Today','This Week','Later','Someday'].map(x=>`<option ${x===t.status?'selected':''}>${x}</option>`).join('')}</select><textarea id="eNotes">${esc(t.notes)}</textarea><button class="btn" onclick="saveTaskEdit('${id}')">Save</button></div>`)}
function saveTaskEdit(id){const t=data.tasks.find(x=>x.id===id);Object.assign(t,{title:val('eTitle'),project:val('eProject'),priority:val('ePriority'),due:val('eDue'),status:val('eStatus'),notes:val('eNotes')});save();closeModal();render()}
function editProposal(id){const p=data.proposals.find(x=>x.id===id);openModal('Edit Proposal',`<div class="grid"><input id="epOpp" value="${esc(p.opportunity)}"><input id="epArch" value="${esc(p.architect)}"><input type="date" id="epDue" value="${p.due}"><select id="epFee">${['Lead','Scoping','Drafting','Submitted','Won','Lost'].map(x=>`<option ${x===p.feeStatus?'selected':''}>${x}</option>`).join('')}</select><input id="epNext" value="${esc(p.nextAction)}"><select id="epStatus"><option ${p.status==='Active'?'selected':''}>Active</option><option ${p.status==='Closed'?'selected':''}>Closed</option></select><button class="btn" onclick="saveProposalEdit('${id}')">Save</button></div>`)}
function saveProposalEdit(id){const p=data.proposals.find(x=>x.id===id);Object.assign(p,{opportunity:val('epOpp'),architect:val('epArch'),due:val('epDue'),feeStatus:val('epFee'),nextAction:val('epNext'),status:val('epStatus')});save();closeModal();render()}
function editWaiting(id){const w=data.waiting.find(x=>x.id===id);openModal('Edit Waiting On',`<div class="grid"><input id="ewItem" value="${esc(w.item)}"><input id="ewPerson" value="${esc(w.person)}"><input type="date" id="ewDue" value="${w.due}"><textarea id="ewNotes">${esc(w.notes)}</textarea><button class="btn" onclick="saveWaitingEdit('${id}')">Save</button></div>`)}
function saveWaitingEdit(id){const w=data.waiting.find(x=>x.id===id);Object.assign(w,{item:val('ewItem'),person:val('ewPerson'),due:val('ewDue'),notes:val('ewNotes')});save();closeModal();render()}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function toggleDark(){data.settings.dark=!data.settings.dark;save();render()}
function exportBackup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='focusflow-backup.json';a.click()}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render()}catch{alert('Could not import that file.')}};r.readAsText(f)}
function render(){save();renderNav();counts();const view=data.settings.view;document.getElementById('viewTitle').textContent=view;document.getElementById('viewSubtitle').textContent={Dashboard:'Plan the day, manage pursuits, and keep follow-ups visible.',Today:'What deserves attention today.',Buckets:'Triage work by commitment level.', 'Waiting On':'Track follow-ups and delegated items.', 'Proposal Tracker':'Manage pursuits, proposal deadlines, fee status, and next actions.', 'Weekly Review':'Reset the system before tasks pile up.'}[view]||'FocusFlow';const open=data.tasks.filter(t=>!t.completed);let html='';if(view==='Dashboard')html=dashboard();if(view==='Today')html=taskForm()+taskList(filteredTasks(open.filter(t=>t.due===todayISO())),'Today');if(view==='Big 3')html=taskList(filteredTasks(open.filter(t=>t.big3)),'Big 3','The three essential wins for today.');if(view==='This Week')html=taskForm()+taskList(filteredTasks(open.filter(t=>isThisWeek(t.due))),'This Week');if(view==='Buckets')html=taskForm()+buckets();if(view==='Waiting On')html=waitingForm()+waitingTable();if(view==='Proposal Tracker')html=proposalForm()+proposalTable();if(view==='Weekly Review')html=weeklyReview();if(view==='Completed')html=taskList(filteredTasks(data.tasks.filter(t=>t.completed)),'Completed','Completed tasks stay here for reference.');document.getElementById('content').innerHTML=html}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
save();render();
</script>
</body>
</html>
