<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FocusFlow v3</title>
<style>
:root{--bg:#f3f6fb;--panel:#fff;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--brand:#0f172a;--soft:#f8fafc;--blue:#2563eb;--green:#16a34a;--orange:#ea580c;--red:#ef4444;--purple:#7c3aed;--shadow:0 16px 40px rgba(15,23,42,.08)}
.dark{--bg:#0b1220;--panel:#111827;--ink:#e5e7eb;--muted:#94a3b8;--line:#253044;--brand:#e5e7eb;--soft:#172033;--shadow:none}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:310px 1fr;gap:28px;min-height:100vh;padding:28px}.side{display:flex;flex-direction:column;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}.brand{padding:28px}.brand h1{font-size:34px;margin:0}.brand p{color:var(--muted);margin:8px 0 24px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{background:var(--soft);border-radius:14px;padding:14px;text-align:center}.stat strong{font-size:24px;display:block}.stat span{font-size:12px;color:var(--muted)}.nav{padding:12px}.nav button{width:100%;display:flex;justify-content:space-between;align-items:center;border:0;background:transparent;color:var(--ink);border-radius:12px;padding:12px 14px;margin:2px 0;text-align:left}.nav button.active{background:#0f172a;color:white}.dark .nav button.active{background:#334155}.tools{padding:14px;display:grid;gap:10px}.btn{border:0;border-radius:13px;padding:12px 16px;background:#0f172a;color:#fff;font-weight:700}.btn.secondary{background:var(--soft);color:var(--ink);border:1px solid var(--line)}.btn.danger{background:#fee2e2;color:#dc2626}.main{display:flex;flex-direction:column;gap:18px;min-width:0}.top{display:grid;grid-template-columns:1fr minmax(260px,520px);gap:20px;align-items:start}.top h2{font-size:36px;margin:0}.top p{margin:6px 0 0;color:var(--muted);font-size:16px}.search{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:16px;padding:16px}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.metric{padding:20px}.metric span{color:var(--muted);font-size:14px}.metric strong{display:block;font-size:34px;margin-top:10px}.blue{color:var(--blue)}.green{color:var(--green)}.orange{color:var(--orange)}.red{color:var(--red)}.purple{color:var(--purple)}.big3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.big{padding:18px;min-height:120px}.big small{font-weight:800;color:var(--muted)}.big h3{font-size:18px;margin:18px 0 8px}.big p{font-size:13px;color:var(--muted);margin:0}.capture{padding:20px}.capture h3,.section h3{font-size:24px;margin:0 0 14px}.grid{display:grid;grid-template-columns:2fr 1fr .8fr 1fr 1fr 1fr auto;gap:10px}.grid.pipeline{grid-template-columns:1.6fr 1fr 1fr 1fr 1fr 1fr auto}.grid.waiting{grid-template-columns:1.6fr 1fr 1fr 1fr 1fr auto}.field{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:14px;padding:12px 14px;min-width:0}.section{padding:22px}.item{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:10px}.circle{width:22px;height:22px;border-radius:50%;border:2px solid #334155;background:transparent}.title{font-weight:800}.meta{color:var(--muted);font-size:13px;margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}.tag{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.p1{background:#fee2e2;color:#dc2626}.p2{background:#ffedd5;color:#ea580c}.p3{background:#dbeafe;color:#2563eb}.p4{background:#e2e8f0;color:#475569}.bigTag{background:#dcfce7;color:#15803d}.todayTag{background:#ede9fe;color:#7c3aed}.actions{display:flex;gap:8px;align-items:center}.mini{border:0;border-radius:11px;padding:9px 11px;background:var(--panel);color:var(--ink);border:1px solid var(--line);font-weight:700}.star{background:#dcfce7;color:#15803d}.delete{background:#fee2e2;color:#dc2626}.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.bucket{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:14px;min-height:180px}.bucket h4{margin:0 0 12px}.smallitem{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;color:var(--muted);font-size:13px}.table td{background:var(--soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.reviewGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.reviewBox textarea{width:100%;min-height:130px;resize:vertical}.hidden{display:none!important}@media(max-width:1050px){.app{grid-template-columns:1fr}.top,.metrics,.big3,.cols,.reviewGrid{grid-template-columns:1fr}.grid,.grid.pipeline,.grid.waiting{grid-template-columns:1fr}.side{position:static}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const starter={
 tasks:[
  {id:1,title:'Finalize structural proposal for client review',project:'Proposals / Pursuits',priority:'P1',due:todayISO(),context:'Work',bucket:'Today',big3:true,completed:false},
  {id:2,title:'Review open RFIs on active projects',project:'Active Projects',priority:'P1',due:todayISO(),context:'Work',bucket:'Today',big3:true,completed:false},
  {id:3,title:'Call key client about upcoming pursuit',project:'Business Development',priority:'P2',due:addDays(3),context:'Work',bucket:'This Week',big3:true,completed:false}
 ],
 pursuits:[{id:101,opportunity:'Sample Mixed-Use Pursuit',architect:'Smith Gee Studio',client:'Developer',due:addDays(4),fee:'Drafting',stage:'Proposal',next:'Confirm scope and fee basis',status:'Open'}],
 waiting:[{id:201,item:'Geotech report for active project',waitingOn:'Geotechnical engineer',project:'Active Projects',due:addDays(2),next:'Follow up by email',status:'Waiting'}],
 review:{wins:'',stuck:'',nextWeek:'',mondayBig3:''},
 dark:false
};
let state=load();let view='Dashboard';let search='';
function load(){try{return JSON.parse(localStorage.getItem('focusflow_v3'))||starter}catch(e){return starter}}
function save(){localStorage.setItem('focusflow_v3',JSON.stringify(state))}
function fmt(d){if(!d)return '';const x=new Date(d+'T00:00:00');return x.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}
function daysUntil(d){return Math.ceil((new Date(d+'T00:00:00')-new Date(new Date().toISOString().slice(0,10)+'T00:00:00'))/86400000)}
function byId(id){return document.getElementById(id)}
function counts(){const open=state.tasks.filter(t=>!t.completed).length;const today=state.tasks.filter(t=>!t.completed&&t.due===todayISO()).length;const done=state.tasks.filter(t=>t.completed).length;const prop=state.pursuits.filter(p=>p.status!=='Won'&&p.status!=='Lost'&&daysUntil(p.due)>=0&&daysUntil(p.due)<=7).length;const active=state.tasks.filter(t=>!t.completed&&t.project==='Active Projects').length;const waiting=state.waiting.filter(w=>w.status==='Waiting').length;const big=state.tasks.filter(t=>!t.completed&&t.big3).length;const over=state.tasks.filter(t=>!t.completed&&daysUntil(t.due)<0).length;return{open,today,done,prop,active,waiting,big,over}}
function navItems(){return [['Dashboard',counts().open],['Today',counts().today],['Big 3',counts().big],['This Week',state.tasks.filter(t=>!t.completed&&daysUntil(t.due)>=0&&daysUntil(t.due)<=7).length],['Buckets',counts().open],['Waiting On',counts().waiting],['Proposal Tracker',state.pursuits.length],['Weekly Review',''],['Completed',counts().done]]}
function render(){document.body.className=state.dark?'dark':'';const c=counts();document.getElementById('root').innerHTML=`<div class="app"><aside class="side"><div class="card brand"><h1>FocusFlow</h1><p>Seller-doer command center</p><div class="stats"><div class="stat"><strong>${c.open}</strong><span>Open</span></div><div class="stat"><strong>${c.today}</strong><span>Today</span></div><div class="stat"><strong>${c.done}</strong><span>Done</span></div></div></div><div class="card nav">${navItems().map(([n,k])=>`<button onclick="setView('${n}')" class="${view===n?'active':''}"><span>${n}</span><span>${k}</span></button>`).join('')}</div><div class="card tools"><button class="btn secondary" onclick="toggleDark()">Toggle dark mode</button><button class="btn secondary" onclick="exportBackup()">Export backup</button><button class="btn secondary" onclick="document.getElementById('importFile').click()">Import backup</button><input id="importFile" type="file" class="hidden" accept="application/json" onchange="importBackup(event)"></div></aside><main class="main"><div class="top"><div><h2>${view}</h2><p>${subtitle()}</p></div><input class="search" placeholder="Search tasks, pursuits, waiting-on items" value="${search}" oninput="search=this.value;render()"></div>${body()}</main></div>`}
function subtitle(){return {Dashboard:'Plan the day, manage pursuits, and keep follow-ups visible.',Today:'Your execution list for today.',Buckets:'Move work between Today, This Week, Later, and Someday.', 'Waiting On':'Track delegated items and follow-ups.', 'Proposal Tracker':'Track pursuit deadlines, stages, fee status, and next actions.', 'Weekly Review':'Reset the system and choose next week’s priorities.'}[view]||'Prioritize and triage your work.'}
function body(){if(view==='Dashboard')return dashboard()+capture()+taskList('Today'); if(view==='Today')return capture()+taskList('Today'); if(view==='Big 3')return taskList('Big 3'); if(view==='This Week')return taskList('This Week'); if(view==='Completed')return taskList('Completed'); if(view==='Buckets')return buckets(); if(view==='Waiting On')return waiting(); if(view==='Proposal Tracker')return pursuits(); if(view==='Weekly Review')return weekly(); return ''}
function dashboard(){const c=counts();return `<div class="metrics"><div class="card metric"><span>Proposal deadlines this week</span><strong class="blue">${c.prop}</strong></div><div class="card metric"><span>Active project actions</span><strong class="purple">${c.active}</strong></div><div class="card metric"><span>Waiting on others</span><strong class="orange">${c.waiting}</strong></div><div class="card metric"><span>Today’s Big 3</span><strong class="green">${c.big}</strong></div><div class="card metric"><span>Overdue</span><strong class="red">${c.over}</strong></div></div><div class="big3">${[0,1,2].map(i=>{const t=state.tasks.filter(x=>x.big3&&!x.completed)[i];return `<div class="card big"><small>Big 3 #${i+1}</small>${t?`<h3>${t.title}</h3><p>${t.project} • ${fmt(t.due)}</p>`:'<h3>Choose an essential task.</h3>'}</div>`}).join('')}</div>`}
function capture(){return `<div class="card capture"><h3>Quick Capture</h3><div class="grid"><input id="ntitle" class="field" placeholder="Add a task, action item, follow-up, or reminder"><select id="nproject" class="field"><option>Inbox</option><option>Active Projects</option><option>Proposals / Pursuits</option><option>Business Development</option><option>KPFF Operations</option><option>Personal</option></select><select id="npriority" class="field"><option>P1</option><option selected>P2</option><option>P3</option><option>P4</option></select><input id="ndue" class="field" type="date" value="${todayISO()}"><select id="ncontext" class="field"><option>Work</option><option>Personal</option></select><select id="nbucket" class="field"><option>Today</option><option selected>This Week</option><option>Later</option><option>Someday</option></select><button class="btn" onclick="addTask()">Add</button></div></div>`}
function taskFilter(t,mode){if(search && !JSON.stringify(t).toLowerCase().includes(search.toLowerCase()))return false;if(mode==='Today')return !t.completed&&t.due===todayISO();if(mode==='Big 3')return !t.completed&&t.big3;if(mode==='This Week')return !t.completed&&daysUntil(t.due)>=0&&daysUntil(t.due)<=7;if(mode==='Completed')return t.completed;return !t.completed}
function taskList(mode){const list=state.tasks.filter(t=>taskFilter(t,mode)).sort((a,b)=>['P1','P2','P3','P4'].indexOf(a.priority)-['P1','P2','P3','P4'].indexOf(b.priority));return `<div class="card section"><h3>${mode}</h3><p class="meta">${mode==='Today'?'Your execution list for today.':'Click the circle to complete. Star a task to make it part of today’s Big 3.'}</p>${list.length?list.map(taskHTML).join(''):'<div class="smallitem">No items here.</div>'}</div>`}
function taskHTML(t){return `<div class="item"><button class="circle" onclick="completeTask(${t.id})"></button><div><div class="title">${t.title}</div><div class="meta"><span>${t.project}</span><span>•</span><span>${fmt(t.due)}</span><span>•</span><span>${t.context}</span><span class="tag ${t.priority.toLowerCase()}">${t.priority}</span>${t.big3?'<span class="tag bigTag">Big 3</span>':''}${t.due===todayISO()?'<span class="tag todayTag">Today</span>':''}</div></div><div class="actions"><button class="mini star" onclick="toggleBig(${t.id})">★</button><button class="mini" onclick="editTask(${t.id})">Edit</button><button class="mini delete" onclick="delTask(${t.id})">Delete</button></div></div>`}
function buckets(){const bs=['Today','This Week','Later','Someday'];return `<div class="card section"><h3>Status Buckets</h3><p class="meta">Use these as drag/drop-style priority buckets using the Move buttons.</p><div class="cols">${bs.map(b=>`<div class="bucket"><h4>${b}</h4>${state.tasks.filter(t=>!t.completed&&t.bucket===b).map(t=>`<div class="smallitem"><strong>${t.title}</strong><div class="meta">${t.project} • ${fmt(t.due)}</div><div class="actions" style="margin-top:10px">${bs.filter(x=>x!==b).map(x=>`<button class="mini" onclick="moveBucket(${t.id},'${x}')">${x}</button>`).join('')}</div></div>`).join('')||'No items.'}</div>`).join('')}</div></div>`}
function waiting(){return `<div class="card capture"><h3>Add Waiting-On Item</h3><div class="grid waiting"><input id="witem" class="field" placeholder="What are you waiting on?"><input id="wperson" class="field" placeholder="Waiting on who?"><input id="wproject" class="field" placeholder="Project/client"><input id="wdue" class="field" type="date" value="${addDays(2)}"><input id="wnext" class="field" placeholder="Next follow-up"><button class="btn" onclick="addWaiting()">Add</button></div></div><div class="card section"><h3>Waiting On</h3><table class="table"><thead><tr><th>Item</th><th>Waiting On</th><th>Project</th><th>Follow Up</th><th>Next</th><th></th></tr></thead><tbody>${state.waiting.map(w=>`<tr><td>${w.item}</td><td>${w.waitingOn}</td><td>${w.project}</td><td>${fmt(w.due)}</td><td>${w.next}</td><td><button class="mini" onclick="clearWaiting(${w.id})">Clear</button></td></tr>`).join('')}</tbody></table></div>`}
function pursuits(){return `<div class="card capture"><h3>Add Proposal / Pursuit</h3><div class="grid pipeline"><input id="popp" class="field" placeholder="Opportunity"><input id="parch" class="field" placeholder="Architect"><input id="pclient" class="field" placeholder="Client"><input id="pdue" class="field" type="date" value="${addDays(7)}"><select id="pfee" class="field"><option>Not started</option><option>Drafting</option><option>Sent</option><option>Negotiating</option></select><input id="pnext" class="field" placeholder="Next action"><button class="btn" onclick="addPursuit()">Add</button></div></div><div class="card section"><h3>Proposal Pipeline</h3><table class="table"><thead><tr><th>Opportunity</th><th>Architect</th><th>Client</th><th>Due</th><th>Fee Status</th><th>Next Action</th><th></th></tr></thead><tbody>${state.pursuits.map(p=>`<tr><td>${p.opportunity}</td><td>${p.architect}</td><td>${p.client}</td><td>${fmt(p.due)}</td><td>${p.fee}</td><td>${p.next}</td><td><button class="mini" onclick="delPursuit(${p.id})">Delete</button></td></tr>`).join('')}</tbody></table></div>`}
function weekly(){return `<div class="card section"><h3>Weekly Review Wizard</h3><p class="meta">Use this at the end of the week to reset and decide what matters next.</p><div class="reviewGrid">${[['wins','Wins this week'],['stuck','Stuck / unresolved'],['nextWeek','Top priorities next week'],['mondayBig3','Monday Big 3 candidates']].map(([id,label])=>`<div class="reviewBox"><h4>${label}</h4><textarea id="r_${id}" class="field" oninput="state.review.${id}=this.value;save()">${state.review[id]||''}</textarea></div>`).join('')}</div><div style="margin-top:16px"><button class="btn" onclick="alert('Weekly review saved.')">Save review</button></div></div>${taskList('This Week')}`}
function addTask(){const t=byId('ntitle').value.trim();if(!t)return;state.tasks.unshift({id:Date.now(),title:t,project:byId('nproject').value,priority:byId('npriority').value,due:byId('ndue').value,context:byId('ncontext').value,bucket:byId('nbucket').value,big3:false,completed:false});save();render()}
function completeTask(id){state.tasks=state.tasks.map(t=>t.id===id?{...t,completed:!t.completed,big3:false}:t);save();render()}
function toggleBig(id){const n=state.tasks.filter(t=>t.big3&&!t.completed).length;state.tasks=state.tasks.map(t=>t.id===id?{...t,big3:t.big3?false:n<3?true:false,bucket:n<3?'Today':t.bucket,due:n<3?todayISO():t.due}:t);save();render()}
function editTask(id){const t=state.tasks.find(x=>x.id===id);const title=prompt('Edit task',t.title);if(title===null)return;t.title=title;const due=prompt('Due date YYYY-MM-DD',t.due);if(due)t.due=due;save();render()}
function delTask(id){if(confirm('Delete this task?')){state.tasks=state.tasks.filter(t=>t.id!==id);save();render()}}
function moveBucket(id,b){state.tasks=state.tasks.map(t=>t.id===id?{...t,bucket:b,due:b==='Today'?todayISO():t.due}:t);save();render()}
function addWaiting(){state.waiting.unshift({id:Date.now(),item:byId('witem').value,waitingOn:byId('wperson').value,project:byId('wproject').value,due:byId('wdue').value,next:byId('wnext').value,status:'Waiting'});save();render()}
function clearWaiting(id){state.waiting=state.waiting.filter(w=>w.id!==id);save();render()}
function addPursuit(){state.pursuits.unshift({id:Date.now(),opportunity:byId('popp').value,architect:byId('parch').value,client:byId('pclient').value,due:byId('pdue').value,fee:byId('pfee').value,stage:'Proposal',next:byId('pnext').value,status:'Open'});save();render()}
function delPursuit(id){state.pursuits=state.pursuits.filter(p=>p.id!==id);save();render()}
function setView(v){view=v;render()}function toggleDark(){state.dark=!state.dark;save();render()}
function exportBackup(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='focusflow-backup.json';a.click()}
function importBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render()}catch(err){alert('Could not import backup.')}};r.readAsText(f)}
render();
</script>
</body>
</html>
