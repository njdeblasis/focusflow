<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFlow V5 - Principal Operating System</title>
  <style>
    :root{
      --bg:#f5f7fb; --panel:#ffffff; --panel2:#f8fafc; --text:#172033; --muted:#64748b; --line:#e2e8f0;
      --brand:#0f172a; --brand2:#1e293b; --accent:#2563eb; --good:#15803d; --warn:#b45309; --bad:#b91c1c;
      --shadow:0 12px 30px rgba(15,23,42,.08); --radius:18px;
    }
    [data-theme="dark"]{
      --bg:#0b1020; --panel:#121a2c; --panel2:#172036; --text:#e5edf8; --muted:#97a6bd; --line:#2a3650;
      --brand:#e5edf8; --brand2:#cbd5e1; --accent:#60a5fa; --good:#4ade80; --warn:#fbbf24; --bad:#f87171;
      --shadow:0 12px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit} button{cursor:pointer}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:20px;position:sticky;top:0;height:100vh;overflow:auto}.brand h1{margin:0;font-size:24px}.brand p{margin:6px 0 18px;color:var(--muted);font-size:13px}.nav{display:flex;flex-direction:column;gap:6px}.nav button{border:0;background:transparent;color:var(--text);text-align:left;padding:11px 12px;border-radius:12px;display:flex;justify-content:space-between;gap:10px}.nav button.active,.nav button:hover{background:var(--brand);color:var(--panel)}.badge{background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 7px;font-size:12px}.nav button.active .badge{background:rgba(255,255,255,.15);color:white;border-color:rgba(255,255,255,.25)}
    main{padding:26px;max-width:1500px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}.topbar h2{margin:0;font-size:30px}.topbar p{margin:6px 0 0;color:var(--muted)}.actions{display:flex;flex-wrap:wrap;gap:8px}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px 13px;border-radius:12px}.btn.primary{background:var(--brand);color:var(--panel);border-color:var(--brand)}.btn.danger{color:var(--bad)}.btn:hover{transform:translateY(-1px)}
    .grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(4,minmax(180px,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h3{margin:0 0 12px;font-size:17px}.kpi .label{color:var(--muted);font-size:13px}.kpi .value{font-size:28px;font-weight:800;margin-top:6px}.kpi .sub{color:var(--muted);font-size:12px;margin-top:4px}.two{grid-template-columns:1.1fr .9fr}.three{grid-template-columns:repeat(3,1fr)}
    table{width:100%;border-collapse:collapse} th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top} th{color:var(--muted);font-weight:700}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--panel2)}.p1{color:var(--bad)}.p2{color:var(--warn)}.p3{color:var(--accent)}.p4{color:var(--muted)}.status{color:var(--accent)}.small{font-size:12px;color:var(--muted)}
    .form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.form .wide{grid-column:span 2}.form .full{grid-column:1/-1} input,select,textarea{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px} textarea{min-height:76px;resize:vertical}.section{display:none}.section.active{display:block}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.split{display:flex;justify-content:space-between;gap:12px;align-items:center}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}.item.done{opacity:.55}.item-title{font-weight:750}.muted{color:var(--muted)}.search{max-width:420px}.wizard-step{border-left:4px solid var(--accent);padding-left:14px;margin:18px 0}.print-plan{background:var(--panel);padding:22px;border:1px solid var(--line);border-radius:var(--radius)}
    .empty{padding:26px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);color:var(--muted);background:var(--panel2)}
    @media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.two,.three,.form{grid-template-columns:1fr}.form .wide{grid-column:auto}main{padding:16px}.topbar{flex-direction:column}}
    @media print{.sidebar,.topbar,.no-print,.nav,.actions{display:none!important}.app{display:block}main{padding:0}.card{box-shadow:none;border:0}.section{display:block}.section:not(#reports){display:none!important}body{background:white;color:black}.print-plan{border:0}}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar no-print">
    <div class="brand"><h1>FocusFlow V5</h1><p>Principal Operating System</p></div>
    <div class="nav" id="nav"></div>
    <div style="margin-top:18px" class="row">
      <button class="btn" onclick="toggleTheme()">Dark / Light</button>
    </div>
  </aside>
  <main>
    <div class="topbar no-print">
      <div><h2 id="pageTitle">Principal Dashboard</h2><p id="pageSub">Business health, execution health, and relationship health in one view.</p></div>
      <div class="actions">
        <button class="btn" onclick="exportBackup()">Export Backup</button>
        <label class="btn">Import Backup<input type="file" id="importFile" accept="application/json" style="display:none" onchange="importBackup(event)"></label>
        <button class="btn danger" onclick="resetSampleData()">Reset Sample Data</button>
      </div>
    </div>

    <section id="dashboard" class="section active"></section>
    <section id="today" class="section"></section>
    <section id="pipeline" class="section"></section>
    <section id="relationships" class="section"></section>
    <section id="tasks" class="section"></section>
    <section id="waiting" class="section"></section>
    <section id="meetings" class="section"></section>
    <section id="weekly" class="section"></section>
    <section id="reports" class="section"></section>
    <section id="settings" class="section"></section>
  </main>
</div>
<script>
const todayISO=()=>new Date().toISOString().slice(0,10);
const addDays=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const fmt=(d)=>d?new Date(d+'T00:00:00').toLocaleDateString():'';
const money=(n)=>Number(n||0).toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0});
const daysBetween=(a,b=todayISO())=>Math.floor((new Date(b)-new Date(a))/(86400000));
const uid=(p)=>p+'_'+Math.random().toString(36).slice(2,9);
const activePursuit=s=>!['Won','Lost','Dormant'].includes(s);
const sample={
 settings:{theme:'light'},
 tasks:[
  {id:uid('task'),title:'Finalize scope assumptions for podium proposal',type:'Proposal Action',category:'Proposals / Pursuits',priority:'P1',dueDate:todayISO(),status:'Today',big3:true,related:'510 N Gay',notes:'Use benchmark fee logic.',completed:false,createdAt:todayISO()},
  {id:uid('task'),title:'Review open RFIs requiring principal input',type:'Project Action',category:'Active Projects',priority:'P1',dueDate:todayISO(),status:'Today',big3:true,related:'Active Projects',notes:'Focus only on critical path items.',completed:false,createdAt:todayISO()},
  {id:uid('task'),title:'Call architect about upcoming Gray AES pursuit',type:'Follow-Up',category:'Business Development',priority:'P2',dueDate:addDays(2),status:'This Week',big3:true,related:'Gray AES',notes:'Confirm schedule and go/no-go timing.',completed:false,createdAt:todayISO()},
  {id:uid('task'),title:'Update staffing notes for Nashville office',type:'Task',category:'Office Leadership',priority:'P2',dueDate:addDays(4),status:'This Week',big3:false,related:'KPFF Nashville',notes:'Review project load.',completed:false,createdAt:todayISO()}
 ],
 pursuits:[
  {id:uid('pursuit'),opportunity:'510 N Gay Mixed-Use',architectClient:'MHM',developerClient:'TBD',client:'MHM',location:'Knoxville, TN',projectType:'5-over-2 podium',constructionCost:50000000,proposedFee:295000,probability:60,proposalDueDate:addDays(7),expectedStartDate:addDays(60),revenueTiming:'Q3 2026',status:'Proposal Due',nextAction:'Confirm scope and fee strategy',nextActionDueDate:addDays(1),primaryContact:'Architect PM',notes:'Use podium benchmarks.'},
  {id:uid('pursuit'),opportunity:'Gray AES Industrial Expansion',architectClient:'Gray AES',developerClient:'Confidential Client',client:'Gray AES',location:'TN / KY',projectType:'PEMB / Industrial',constructionCost:30000000,proposedFee:165000,probability:55,proposalDueDate:addDays(13),expectedStartDate:addDays(75),revenueTiming:'Q3-Q4 2026',status:'Lead',nextAction:'Schedule pursuit call',nextActionDueDate:addDays(3),primaryContact:'Gray AES contact',notes:'Coordinate with Greg.'}
 ],
 people:[
  {id:uid('person'),name:'Greg Buccola',company:'KPFF Latitude',role:'Managing Principal',type:'Internal',lastContact:addDays(-5),nextContact:addDays(4),notes:'Coordinate on Gray AES pursuits.'},
  {id:uid('person'),name:'Smith Gee PM',company:'Smith Gee Studio',role:'Architect PM',type:'Architect Client',lastContact:addDays(-20),nextContact:addDays(2),notes:'Important Nashville relationship.'},
  {id:uid('person'),name:'Gray AES Contact',company:'Gray AES',role:'Client Contact',type:'Client',lastContact:addDays(-10),nextContact:addDays(1),notes:'Follow up on upcoming work.'}
 ],
 waiting:[
  {id:uid('wait'),person:'Architect PM',company:'MHM',item:'Confirm proposal due date and scope assumptions',related:'510 N Gay',lastContactDate:addDays(-6),followUpDate:todayISO(),status:'Waiting',notes:'Follow up today.'}
 ],
 meetings:[
  {id:uid('meet'),title:'Proposal review call',date:todayISO(),time:'10:00 AM',attendees:'Architect, KPFF',related:'510 N Gay',prepNeeded:'Review fee table and assumptions',followUpNeeded:true,notes:'Capture action items.'}
 ],
 weekly:{outcomes:['Submit priority proposal','Clear overdue project actions','Complete relationship follow-ups'],mondayBig3:[]}
};
let data=load(); let current='dashboard';
function load(){try{return JSON.parse(localStorage.getItem('focusflow_v5'))||structuredClone(sample)}catch{return structuredClone(sample)}}
function save(){localStorage.setItem('focusflow_v5',JSON.stringify(data));render()}
function setPage(p){current=p;document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(p).classList.add('active');render()}
function navCounts(){return {dashboard:'',today:data.tasks.filter(t=>!t.completed&&t.dueDate<=todayISO()).length,pipeline:data.pursuits.filter(p=>activePursuit(p.status)).length,relationships:data.people.filter(p=>p.nextContact<=addDays(7)).length,tasks:data.tasks.filter(t=>!t.completed).length,waiting:data.waiting.filter(w=>w.status!=='Resolved').length,meetings:data.meetings.filter(m=>m.date===todayISO()).length,weekly:'',reports:'',settings:''}}
const pages=[['dashboard','Principal Dashboard','Business and execution health.'],['today','Today','Daily execution mode.'],['pipeline','Proposal Pipeline','Pursuit CRM and revenue timing.'],['relationships','Relationships','Client, architect, and internal touchpoints.'],['tasks','Tasks / Project Actions','Unified action database by type.'],['waiting','Waiting On','Delegated and pending follow-ups.'],['meetings','Meetings','Prep and follow-up tracking.'],['weekly','Weekly Review','Guided Full Focus-style review.'],['reports','Printable Plan','Print or PDF weekly plan.'],['settings','Settings / Backup','Data tools and preferences.']];
function renderNav(){const c=navCounts();document.getElementById('nav').innerHTML=pages.map(p=>`<button class="${current===p[0]?'active':''}" onclick="setPage('${p[0]}')"><span>${p[1]}</span>${c[p[0]]!==''?`<span class="badge">${c[p[0]]}</span>`:''}</button>`).join('')}
function render(){document.documentElement.dataset.theme=data.settings.theme;renderNav();const page=pages.find(p=>p[0]===current);document.getElementById('pageTitle').textContent=page[1];document.getElementById('pageSub').textContent=page[2];renderDashboard();renderToday();renderPipeline();renderRelationships();renderTasks();renderWaiting();renderMeetings();renderWeekly();renderReports();renderSettings()}
function kpis(){const active=data.pursuits.filter(p=>activePursuit(p.status));const pipeline=active.reduce((s,p)=>s+Number(p.proposedFee||0),0);const weighted=active.reduce((s,p)=>s+Number(p.proposedFee||0)*Number(p.probability||0)/100,0);return {pipeline,weighted,pursuits14:active.filter(p=>p.proposalDueDate<=addDays(14)).length,revenue90:active.filter(p=>p.expectedStartDate<=addDays(90)).reduce((s,p)=>s+Number(p.proposedFee||0)*Number(p.probability||0)/100,0),big3:data.tasks.filter(t=>t.big3&&!t.completed).length,openP1:data.tasks.filter(t=>!t.completed&&t.priority==='P1').length,overdue:data.tasks.filter(t=>!t.completed&&t.dueDate<todayISO()).length,followups:data.waiting.filter(w=>w.status!=='Resolved'&&w.followUpDate<=todayISO()).length,waiting:data.waiting.filter(w=>w.status!=='Resolved').length,meetings:data.meetings.filter(m=>m.date===todayISO()).length,relationships:data.people.filter(p=>p.nextContact<=addDays(7)).length}}
function renderDashboard(){const k=kpis();document.getElementById('dashboard').innerHTML=`<div class="grid kpis"><div class="card kpi"><div class="label">Pipeline Total</div><div class="value">${money(k.pipeline)}</div><div class="sub">Active pursuits</div></div><div class="card kpi"><div class="label">Weighted Pipeline</div><div class="value">${money(k.weighted)}</div><div class="sub">Fee x probability</div></div><div class="card kpi"><div class="label">Expected Revenue Next 90 Days</div><div class="value">${money(k.revenue90)}</div><div class="sub">Weighted by start date</div></div><div class="card kpi"><div class="label">Pursuits Due Next 14 Days</div><div class="value">${k.pursuits14}</div><div class="sub">Proposal deadlines</div></div><div class="card kpi"><div class="label">Today's Big 3</div><div class="value">${k.big3}</div><div class="sub">Execution focus</div></div><div class="card kpi"><div class="label">Open P1 Actions</div><div class="value">${k.openP1}</div><div class="sub">Highest priority</div></div><div class="card kpi"><div class="label">Follow-Ups Due</div><div class="value">${k.followups}</div><div class="sub">Waiting-on items</div></div><div class="card kpi"><div class="label">Relationship Touches</div><div class="value">${k.relationships}</div><div class="sub">Due this week</div></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Today's Big 3</h3>${taskList(data.tasks.filter(t=>t.big3&&!t.completed).slice(0,3))}</div><div class="card"><h3>Follow-Ups Due</h3>${waitingTable(data.waiting.filter(w=>w.status!=='Resolved'&&w.followUpDate<=todayISO()))}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Proposal Pipeline Snapshot</h3>${pipelineTable(data.pursuits.filter(p=>activePursuit(p.status)).slice(0,5))}</div><div class="card"><h3>Relationship Touches Due</h3>${peopleTable(data.people.filter(p=>p.nextContact<=addDays(7)))}</div></div>`}
function taskList(arr){if(!arr.length)return '<div class="empty">No items.</div>';return `<div class="list">${arr.map(t=>`<div class="item ${t.completed?'done':''}"><div class="split"><div><div class="item-title">${t.title}</div><div class="small">${t.type} • ${t.category} • ${fmt(t.dueDate)} • <span class="${t.priority.toLowerCase()}">${t.priority}</span></div></div><div class="row"><button class="btn" onclick="toggleDone('${t.id}')">${t.completed?'Undo':'Done'}</button><button class="btn" onclick="editTask('${t.id}')">Edit</button></div></div></div>`).join('')}</div>`}
function pipelineTable(arr){if(!arr.length)return '<div class="empty">No pursuits.</div>';return `<table><tr><th>Opportunity</th><th>Clients</th><th>Fee</th><th>Prob.</th><th>Weighted</th><th>Due</th><th>Next</th></tr>${arr.map(p=>`<tr><td><b>${p.opportunity}</b><div class="small">${p.projectType}</div></td><td>${p.architectClient}<div class="small">Dev: ${p.developerClient}</div></td><td>${money(p.proposedFee)}</td><td>${p.probability}%</td><td>${money(Number(p.proposedFee||0)*Number(p.probability||0)/100)}</td><td>${fmt(p.proposalDueDate)}</td><td>${p.nextAction||''}</td></tr>`).join('')}</table>`}
function waitingTable(arr){if(!arr.length)return '<div class="empty">Nothing due.</div>';return `<table><tr><th>Person</th><th>Item</th><th>Follow-Up</th><th>Days</th></tr>${arr.map(w=>`<tr><td><b>${w.person}</b><div class="small">${w.company}</div></td><td>${w.item}<div class="small">${w.related}</div></td><td>${fmt(w.followUpDate)}</td><td>${daysBetween(w.lastContactDate)}</td></tr>`).join('')}</table>`}
function peopleTable(arr){if(!arr.length)return '<div class="empty">No relationship touches due.</div>';return `<table><tr><th>Name</th><th>Company</th><th>Type</th><th>Next Contact</th></tr>${arr.map(p=>`<tr><td><b>${p.name}</b><div class="small">${p.role}</div></td><td>${p.company}</td><td>${p.type}</td><td>${fmt(p.nextContact)}</td></tr>`).join('')}</table>`}
function formFields(type,obj={}){if(type==='task')return `<div class="form"><input class="wide" id="ftitle" placeholder="Action title" value="${obj.title||''}"><select id="ftype">${['Task','Project Action','Proposal Action','Follow-Up','Meeting Action','Personal'].map(x=>`<option ${obj.type===x?'selected':''}>${x}</option>`)}</select><select id="fpriority">${['P1','P2','P3','P4'].map(x=>`<option ${obj.priority===x?'selected':''}>${x}</option>`)}</select><input id="fcategory" placeholder="Category" value="${obj.category||''}"><input id="frelated" placeholder="Related project/pursuit" value="${obj.related||''}"><input id="fdue" type="date" value="${obj.dueDate||todayISO()}"><select id="fstatus">${['Today','This Week','Waiting','Someday','Done'].map(x=>`<option ${obj.status===x?'selected':''}>${x}</option>`)}</select><textarea class="full" id="fnotes" placeholder="Notes">${obj.notes||''}</textarea><label><input type="checkbox" id="fbig3" ${obj.big3?'checked':''}> Big 3</label></div>`}
function renderToday(){const due=data.tasks.filter(t=>!t.completed&&t.dueDate<=todayISO());document.getElementById('today').innerHTML=`<div class="grid two"><div class="card"><h3>Daily Big 3</h3>${taskList(data.tasks.filter(t=>t.big3&&!t.completed))}</div><div class="card"><h3>Meetings Today</h3>${meetingTable(data.meetings.filter(m=>m.date===todayISO()))}</div></div><div class="card" style="margin-top:16px"><h3>Due Today / Overdue</h3>${taskList(due)}</div><div class="card" style="margin-top:16px"><h3>Quick Capture</h3>${formFields('task')}<button class="btn primary" onclick="addTask()">Add Action</button></div>`}
function renderPipeline(){document.getElementById('pipeline').innerHTML=`<div class="card"><div class="split"><h3>Proposal Pipeline</h3><button class="btn primary" onclick="editPursuit()">Add Pursuit</button></div>${pipelineTable(data.pursuits)}</div>`}
function renderRelationships(){document.getElementById('relationships').innerHTML=`<div class="card"><div class="split"><h3>Relationships</h3><button class="btn primary" onclick="editPerson()">Add Person</button></div>${peopleTable(data.people)}</div>`}
function renderTasks(){document.getElementById('tasks').innerHTML=`<div class="card"><div class="split"><h3>Unified Actions</h3><button class="btn primary" onclick="editTask()">Add Action</button></div>${taskList(data.tasks.filter(t=>!t.completed))}</div>`}
function renderWaiting(){document.getElementById('waiting').innerHTML=`<div class="card"><div class="split"><h3>Waiting On</h3><button class="btn primary" onclick="editWaiting()">Add Waiting-On Item</button></div>${waitingTable(data.waiting)}</div>`}
function meetingTable(arr){if(!arr.length)return '<div class="empty">No meetings.</div>';return `<table><tr><th>Time</th><th>Meeting</th><th>Related</th><th>Prep</th></tr>${arr.map(m=>`<tr><td>${m.time}</td><td><b>${m.title}</b><div class="small">${m.attendees}</div></td><td>${m.related}</td><td>${m.prepNeeded}</td></tr>`).join('')}</table>`}
function renderMeetings(){document.getElementById('meetings').innerHTML=`<div class="card"><div class="split"><h3>Meetings</h3><button class="btn primary" onclick="editMeeting()">Add Meeting</button></div>${meetingTable(data.meetings)}</div>`}
function renderWeekly(){document.getElementById('weekly').innerHTML=`<div class="card"><h3>Weekly Review Wizard</h3><div class="wizard-step"><b>1. Completed this week</b>${taskList(data.tasks.filter(t=>t.completed))}</div><div class="wizard-step"><b>2. Overdue items</b>${taskList(data.tasks.filter(t=>!t.completed&&t.dueDate<todayISO()))}</div><div class="wizard-step"><b>3. Waiting-on review</b>${waitingTable(data.waiting.filter(w=>w.status!=='Resolved'))}</div><div class="wizard-step"><b>4. Proposal review</b>${pipelineTable(data.pursuits.filter(p=>activePursuit(p.status)))}</div><div class="wizard-step"><b>5. Set next week's priority outcomes</b><textarea id="outcomes" class="full" onblur="data.weekly.outcomes=this.value.split('\n').filter(Boolean);save()">${(data.weekly.outcomes||[]).join('\n')}</textarea></div><button class="btn primary" onclick="setPage('reports')">Generate Printable Weekly Plan</button></div>`}
function renderReports(){const k=kpis();document.getElementById('reports').innerHTML=`<div class="print-plan"><h1>FocusFlow Weekly Plan</h1><p>${fmt(todayISO())}</p><h2>Business Health</h2><p>Pipeline Total: <b>${money(k.pipeline)}</b> | Weighted Pipeline: <b>${money(k.weighted)}</b> | Expected Revenue Next 90 Days: <b>${money(k.revenue90)}</b></p><h2>Next Week Priority Outcomes</h2><ol>${(data.weekly.outcomes||[]).map(o=>`<li>${o}</li>`).join('')}</ol><h2>Monday Big 3</h2>${taskList(data.tasks.filter(t=>t.big3&&!t.completed))}<h2>Proposal Priorities</h2>${pipelineTable(data.pursuits.filter(p=>activePursuit(p.status)).slice(0,6))}<h2>Follow-Ups</h2>${waitingTable(data.waiting.filter(w=>w.status!=='Resolved'))}<h2>Relationship Touches</h2>${peopleTable(data.people.filter(p=>p.nextContact<=addDays(14)))}</div><div class="actions no-print" style="margin-top:16px"><button class="btn primary" onclick="window.print()">Print / Save as PDF</button></div>`}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card"><h3>Settings / Backup</h3><p class="muted">Data saves locally in this browser/app. Export a backup regularly and store it in OneDrive.</p><div class="row"><button class="btn" onclick="exportBackup()">Export Backup</button><label class="btn">Import Backup<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label><button class="btn" onclick="toggleTheme()">Toggle Dark Mode</button><button class="btn danger" onclick="resetSampleData()">Reset Sample Data</button></div></div>`}
function toggleDone(id){const t=data.tasks.find(x=>x.id===id);if(t){t.completed=!t.completed;t.completedAt=t.completed?todayISO():null;t.status=t.completed?'Done':'Today';save()}}
function addTask(){data.tasks.unshift({id:uid('task'),title:val('ftitle'),type:val('ftype'),category:val('fcategory'),priority:val('fpriority'),dueDate:val('fdue'),status:val('fstatus'),big3:document.getElementById('fbig3').checked,related:val('frelated'),notes:val('fnotes'),completed:false,createdAt:todayISO()});save()}
function val(id){return document.getElementById(id)?.value||''}
function editTask(id){const t=id?data.tasks.find(x=>x.id===id):{};const title=prompt('Action title:',t.title||'');if(title===null)return;Object.assign(t,{id:t.id||uid('task'),title,type:prompt('Type:',t.type||'Task')||'Task',category:prompt('Category:',t.category||'')||'',priority:prompt('Priority P1-P4:',t.priority||'P2')||'P2',dueDate:prompt('Due date YYYY-MM-DD:',t.dueDate||todayISO())||todayISO(),status:prompt('Status:',t.status||'Today')||'Today',related:prompt('Related:',t.related||'')||'',notes:prompt('Notes:',t.notes||'')||'',completed:t.completed||false,big3:confirm('Make this Big 3?')});if(!id)data.tasks.unshift(t);save()}
function editPursuit(){const p={id:uid('pursuit'),opportunity:prompt('Opportunity name:','')||'New Pursuit',architectClient:prompt('Architect Client:','')||'',developerClient:prompt('Developer Client:','')||'',client:prompt('Client:','')||'',projectType:prompt('Project type:','')||'',constructionCost:Number(prompt('Construction cost:','0')||0),proposedFee:Number(prompt('Proposed fee:','0')||0),probability:Number(prompt('Win probability %:','50')||50),proposalDueDate:prompt('Proposal due date YYYY-MM-DD:',addDays(7))||addDays(7),expectedStartDate:prompt('Expected start date YYYY-MM-DD:',addDays(60))||addDays(60),revenueTiming:prompt('Revenue timing:','Q3 2026')||'',status:prompt('Status:','Lead')||'Lead',nextAction:prompt('Next action:','')||'',nextActionDueDate:prompt('Next action due date YYYY-MM-DD:',addDays(3))||addDays(3),primaryContact:prompt('Primary contact:','')||'',notes:prompt('Notes:','')||''};data.pursuits.unshift(p);save()}
function editPerson(){data.people.unshift({id:uid('person'),name:prompt('Name:','')||'New Contact',company:prompt('Company:','')||'',role:prompt('Role:','')||'',type:prompt('Type:','Client')||'Client',lastContact:prompt('Last contact YYYY-MM-DD:',todayISO())||todayISO(),nextContact:prompt('Next contact YYYY-MM-DD:',addDays(7))||addDays(7),notes:prompt('Notes:','')||''});save()}
function editWaiting(){data.waiting.unshift({id:uid('wait'),person:prompt('Person:','')||'',company:prompt('Company:','')||'',item:prompt('What are you waiting on?','')||'',related:prompt('Related project/pursuit:','')||'',lastContactDate:prompt('Last contact YYYY-MM-DD:',todayISO())||todayISO(),followUpDate:prompt('Follow-up date YYYY-MM-DD:',addDays(2))||addDays(2),status:'Waiting',notes:prompt('Notes:','')||''});save()}
function editMeeting(){data.meetings.unshift({id:uid('meet'),title:prompt('Meeting title:','')||'New Meeting',date:prompt('Date YYYY-MM-DD:',todayISO())||todayISO(),time:prompt('Time:','9:00 AM')||'',attendees:prompt('Attendees:','')||'',related:prompt('Related:','')||'',prepNeeded:prompt('Prep needed:','')||'',followUpNeeded:confirm('Follow-up needed?'),notes:prompt('Notes:','')||''});save()}
function toggleTheme(){data.settings.theme=data.settings.theme==='dark'?'light':'dark';save()}
function exportBackup(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='focusflow-v5-backup-'+todayISO()+'.json';a.click()}
function importBackup(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();alert('Backup imported.')}catch{alert('Import failed.')}};r.readAsText(file)}
function resetSampleData(){if(confirm('Replace current data with sample data? Export first if needed.')){data=structuredClone(sample);save()}}
render();
</script>
