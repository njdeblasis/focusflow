<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusFlow v4</title>
  <style>
    :root{--bg:#f3f6fb;--panel:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--nav:#0f172a;--blue:#2563eb;--green:#16a34a;--red:#ef4444;--orange:#f97316;--purple:#7c3aed;--shadow:0 18px 50px rgba(15,23,42,.08);--radius:20px}
    [data-theme="dark"]{--bg:#0b1220;--panel:#111827;--text:#f8fafc;--muted:#94a3b8;--line:#263244;--nav:#1e293b;--shadow:none}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
    .app{display:grid;grid-template-columns:300px 1fr;gap:28px;max-width:1800px;margin:0 auto;padding:28px}.sidebar{position:sticky;top:28px;height:calc(100vh - 56px);display:flex;flex-direction:column;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.brand{padding:28px}.brand h1{font-size:34px;margin:0 0 8px}.brand p{color:var(--muted);margin:0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:24px}.stat{background:rgba(148,163,184,.09);border-radius:14px;padding:14px;text-align:center}.stat b{font-size:24px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.nav{padding:12px}.nav button{width:100%;border:0;background:transparent;color:var(--text);display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-radius:12px;margin:2px 0;text-align:left}.nav button.active{background:var(--nav);color:#fff}.tools{padding:14px;display:grid;gap:10px}.btn{border:0;border-radius:14px;padding:13px 18px;background:var(--nav);color:#fff;font-weight:750}.btn.secondary{background:transparent;color:var(--text);border:1px solid var(--line)}.btn.danger{background:#fee2e2;color:#dc2626}.btn.ok{background:#dcfce7;color:#15803d}.btn.small{padding:8px 11px;font-size:13px;border-radius:10px}.main{min-width:0}.top{display:grid;grid-template-columns:1fr 520px;gap:22px;align-items:start;margin-bottom:22px}.title h2{font-size:38px;margin:0 0 6px}.title p{margin:0;color:var(--muted);font-size:16px}.search{width:100%;padding:16px 18px;border:1px solid var(--line);border-radius:16px;background:var(--panel);color:var(--text)}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(5,1fr);margin-bottom:22px}.kpi{padding:18px}.kpi span{color:var(--muted);font-size:14px}.kpi b{display:block;font-size:34px;margin-top:12px}.blue{color:var(--blue)}.green{color:var(--green)}.red{color:var(--red)}.orange{color:var(--orange)}.purple{color:var(--purple)}.big3{grid-template-columns:repeat(3,1fr);margin-bottom:22px}.big{padding:22px;min-height:132px}.big label{color:var(--muted);font-weight:800;font-size:14px}.big h3{font-size:18px;margin:16px 0 10px}.meta{color:var(--muted);font-size:13px}.section{padding:22px;margin-bottom:22px}.section h3{font-size:25px;margin:0}.section .sub{color:var(--muted);margin:6px 0 18px}.form{display:grid;grid-template-columns:1.7fr 1fr .65fr .8fr .85fr .9fr auto;gap:12px}.form input,.form select,.form textarea,.modal input,.modal select,.modal textarea{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:13px;padding:13px 14px;width:100%}.list{display:grid;gap:10px}.row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;padding:16px;border:1px solid var(--line);background:rgba(248,250,252,.52);border-radius:16px}.circle{width:24px;height:24px;border-radius:50%;border:2px solid #334155;background:transparent}.circle.done{background:var(--green);border-color:var(--green)}.row h4{margin:0 0 7px;font-size:17px}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}.chip{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.p1{background:#fee2e2;color:#dc2626}.p2{background:#ffedd5;color:#c2410c}.p3{background:#dbeafe;color:#1d4ed8}.p4{background:#e2e8f0;color:#475569}.bigchip{background:#dcfce7;color:#15803d}.todaychip{background:#ede9fe;color:#7c3aed}.bucketchip{background:#f1f5f9;color:#475569}.actions{display:flex;gap:8px;align-items:center}.tablewrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;color:var(--muted);font-size:13px;font-weight:800;padding:0 12px}.table td{background:rgba(248,250,252,.55);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 12px;vertical-align:top}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.kanban{grid-template-columns:repeat(4,1fr)}.column{padding:14px;background:rgba(148,163,184,.08);border-radius:18px;min-height:220px}.column h4{margin:0 0 12px}.mini{padding:13px;background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:10px}.review{grid-template-columns:repeat(2,1fr)}.check{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px}.empty{border:1px dashed var(--line);border-radius:16px;padding:26px;text-align:center;color:var(--muted)}.modalBg{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modalBg.show{display:flex}.modal{background:var(--panel);border:1px solid var(--line);border-radius:22px;width:min(680px,100%);padding:24px;box-shadow:var(--shadow)}.modal h3{margin:0 0 14px}.modalgrid{display:grid;gap:12px}.footerNote{color:var(--muted);font-size:12px;padding:0 6px 16px}.hidden{display:none!important}@media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.top{grid-template-columns:1fr}.kpis,.big3,.kanban,.review{grid-template-columns:1fr}.form{grid-template-columns:1fr}.brand h1{font-size:28px}}
  </style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="card brand"><h1>FocusFlow</h1><p>KPFF principal command center</p><div class="stats"><div class="stat"><b id="openStat">0</b><span>Open</span></div><div class="stat"><b id="todayStat">0</b><span>Today</span></div><div class="stat"><b id="doneStat">0</b><span>Done</span></div></div></div>
    <div class="card nav" id="nav"></div>
    <div class="card tools"><button class="btn secondary" onclick="toggleTheme()">Toggle dark mode</button><button class="btn secondary" onclick="exportData()">Export backup</button><button class="btn secondary" onclick="document.getElementById('importFile').click()">Import backup</button><input id="importFile" type="file" accept="application/json" class="hidden" onchange="importData(event)"><div class="footerNote">Tip: export to OneDrive weekly.</div></div>
  </aside>
  <main class="main"><div class="top"><div class="title"><h2 id="viewTitle">Dashboard</h2><p id="viewSub">Plan the day, manage pursuits, and keep follow-ups visible.</p></div><input class="search" id="search" oninput="render()" placeholder="Search tasks, pursuits, projects, waiting-on items"></div><div id="content"></div></main>
</div>
<div class="modalBg" id="modalBg"><div class="modal"><h3 id="modalTitle">Edit</h3><div id="modalContent"></div></div></div>
<script>
const todayISO=()=>new Date().toISOString().slice(0,10); const daysFrom=(n)=>{let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}; const fmt=(d)=> d? new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):''; const isThisWeek=(d)=>{if(!d)return false;let now=new Date();let x=new Date(d+'T00:00:00');let end=new Date();end.setDate(now.getDate()+7);return x>=new Date(todayISO()+'T00:00:00')&&x<=end}; const overdue=(d)=>d && d<todayISO();
const seed={tasks:[{id:1,title:'Finalize structural proposal for client review',project:'Proposals / Pursuits',priority:'P1',due:todayISO(),context:'Work',bucket:'This Week',big3:true,completed:false,notes:''},{id:2,title:'Review open RFIs on active projects',project:'Active Projects',priority:'P1',due:todayISO(),context:'Work',bucket:'This Week',big3:true,completed:false,notes:''},{id:3,title:'Call key client about upcoming pursuit',project:'Business Development',priority:'P2',due:daysFrom(3),context:'Work',bucket:'This Week',big3:true,completed:false,notes:''}],pursuits:[{id:101,opportunity:'Mixed-use podium pursuit',architect:'Smith Gee Studio',developer:'Developer TBD',fee:295000,due:daysFrom(5),probability:55,status:'Proposal Due',nextAction:'Confirm scope assumptions and fee strategy'}],actions:[{id:201,project:'Sample Active Project',item:'Respond to structural coordination question',assignedTo:'Nick',due:daysFrom(2),status:'Open',notes:''}],waiting:[{id:301,person:'Architect',company:'Design Team',item:'Background drawings and updated parking layout',followUp:daysFrom(1),related:'Mixed-use podium pursuit',status:'Waiting'}],reviewNotes:{wins:'',defer:'',nextWeek:'',mondayBig3:''},theme:'light'};
let state=JSON.parse(localStorage.getItem('focusflow_v4')||'null')||seed; let view='Dashboard';
function save(){localStorage.setItem('focusflow_v4',JSON.stringify(state))}
function textMatch(o){let q=document.getElementById('search')?.value?.toLowerCase()||''; return !q || JSON.stringify(o).toLowerCase().includes(q)}
function navItems(){return [['Dashboard',state.tasks.filter(t=>!t.completed).length],['Today',state.tasks.filter(t=>!t.completed&&t.due===todayISO()).length],['Big 3',state.tasks.filter(t=>!t.completed&&t.big3).length],['This Week',state.tasks.filter(t=>!t.completed&&isThisWeek(t.due)).length],['Buckets',state.tasks.filter(t=>!t.completed).length],['Waiting On',state.waiting.filter(w=>w.status!=='Done').length],['Proposal Pipeline',state.pursuits.length],['Project Actions',state.actions.filter(a=>a.status!=='Done').length],['Weekly Review',''],['Completed',state.tasks.filter(t=>t.completed).length]]}
function renderNav(){nav.innerHTML=navItems().map(([n,c])=>`<button class="${view===n?'active':''}" onclick="view='${n}';render()"><span>${n}</span><span>${c}</span></button>`).join('')}
function render(){document.body.dataset.theme=state.theme||'light'; renderNav(); openStat.textContent=state.tasks.filter(t=>!t.completed).length; todayStat.textContent=state.tasks.filter(t=>!t.completed&&t.due===todayISO()).length; doneStat.textContent=state.tasks.filter(t=>t.completed).length; const map={Dashboard:['Dashboard','Plan the day, manage pursuits, and keep follow-ups visible.'],Today:['Today','Your execution list for today.'], 'Big 3':['Big 3','Your three essential outcomes.'], 'This Week':['This Week','Everything due in the next seven days.'], Buckets:['Priority Buckets','Move work from Someday to Later to This Week to Today.'], 'Waiting On':['Waiting On','Follow-ups that should not disappear.'], 'Proposal Pipeline':['Proposal Pipeline','Track pursuits like a lightweight CRM.'], 'Project Actions':['Project Action Log','RFIs, submittals, client follow-ups, and delegated items.'], 'Weekly Review':['Weekly Review','Close loops and choose next week deliberately.'], Completed:['Completed','Finished tasks.']}; viewTitle.textContent=map[view][0]; viewSub.textContent=map[view][1]; content.innerHTML=({Dashboard:dash,Today:()=>taskSection('Today',t=>!t.completed&&t.due===todayISO()),'Big 3':()=>taskSection('Big 3',t=>!t.completed&&t.big3),'This Week':()=>taskSection('This Week',t=>!t.completed&&isThisWeek(t.due)),Buckets:buckets,'Waiting On':waiting,'Proposal Pipeline':pursuits,'Project Actions':actions,'Weekly Review':weekly,Completed:()=>taskSection('Completed',t=>t.completed)})[view](); save()}
function dash(){let proposals=state.pursuits.filter(p=>isThisWeek(p.due)).length, actionsN=state.actions.filter(a=>a.status!=='Done').length, waitN=state.waiting.filter(w=>w.status!=='Done').length, big=state.tasks.filter(t=>!t.completed&&t.big3).length, over=state.tasks.filter(t=>!t.completed&&overdue(t.due)).length; return `<div class="grid kpis"><div class="card kpi"><span>Proposal deadlines this week</span><b class="blue">${proposals}</b></div><div class="card kpi"><span>Active project actions</span><b class="purple">${actionsN}</b></div><div class="card kpi"><span>Waiting on others</span><b class="orange">${waitN}</b></div><div class="card kpi"><span>Today's Big 3</span><b class="green">${big}</b></div><div class="card kpi"><span>Overdue</span><b class="red">${over}</b></div></div>${big3Cards()}${quickCapture()}${taskSection('Today',t=>!t.completed&&t.due===todayISO(),true)}${pipelineSummary()}${waitingSummary()}`}
function big3Cards(){let arr=state.tasks.filter(t=>!t.completed&&t.big3);return `<div class="grid big3">${[0,1,2].map(i=>`<div class="card big"><label>Big 3 #${i+1}</label>${arr[i]?`<h3>${arr[i].title}</h3><div class="meta">${arr[i].project} • ${fmt(arr[i].due)}</div>`:'<p class="meta">Choose one essential result.</p>'}</div>`).join('')}</div>`}
function quickCapture(){return `<div class="card section"><h3>Quick Capture</h3><div class="form" style="margin-top:14px"><input id="newTitle" placeholder="Add a task, action item, follow-up, or reminder..."><select id="newProject"><option>Inbox</option><option>Active Projects</option><option>Proposals / Pursuits</option><option>Business Development</option><option>KPFF Operations</option><option>Personal</option></select><select id="newPriority"><option>P1</option><option selected>P2</option><option>P3</option><option>P4</option></select><input id="newDue" type="date" value="${todayISO()}"><select id="newContext"><option>Work</option><option>Personal</option></select><select id="newBucket"><option>Today</option><option selected>This Week</option><option>Later</option><option>Someday</option></select><button class="btn" onclick="addTask()">Add</button></div></div>`}
function taskSection(title,filter,compact=false){let rows=state.tasks.filter(t=>filter(t)&&textMatch(t)).sort((a,b)=>['P1','P2','P3','P4'].indexOf(a.priority)-['P1','P2','P3','P4'].indexOf(b.priority));return `<div class="card section"><h3>${title}</h3><p class="sub">${compact?'Your execution list for today.':'Click the circle to complete. Star a task to make it part of today’s Big 3.'}</p><div class="list">${rows.length?rows.map(taskRow).join(''):'<div class="empty">Nothing here.</div>'}</div></div>`}
function taskRow(t){return `<div class="row"><button class="circle ${t.completed?'done':''}" onclick="toggleDone(${t.id})"></button><div><h4>${t.title}</h4><div class="meta">${t.project} • ${fmt(t.due)} • ${t.context}</div><div class="chips"><span class="chip ${t.priority.toLowerCase()}">${t.priority}</span>${t.big3?'<span class="chip bigchip">Big 3</span>':''}<span class="chip bucketchip">${t.bucket}</span>${t.due===todayISO()?'<span class="chip todaychip">Today</span>':''}${overdue(t.due)&&!t.completed?'<span class="chip p1">Overdue</span>':''}</div></div><div class="actions"><button class="btn small ok" onclick="toggleBig(${t.id})">★</button><button class="btn small secondary" onclick="editTask(${t.id})">Edit</button><button class="btn small danger" onclick="delTask(${t.id})">Delete</button></div></div>`}
function buckets(){let cols=['Today','This Week','Later','Someday'];return quickCapture()+`<div class="grid kanban">${cols.map(c=>`<div class="column"><h4>${c}</h4>${state.tasks.filter(t=>!t.completed&&t.bucket===c&&textMatch(t)).map(t=>`<div class="mini"><b>${t.title}</b><div class="meta">${t.priority} • ${fmt(t.due)}</div><div class="actions" style="margin-top:8px"><button class="btn small secondary" onclick="moveBucket(${t.id},-1)">←</button><button class="btn small secondary" onclick="moveBucket(${t.id},1)">→</button></div></div>`).join('')||'<div class="empty">Empty</div>'}</div>`).join('')}</div>`}
function pipelineSummary(){return `<div class="card section"><h3>Proposal Pipeline Snapshot</h3><p class="sub">Total potential structural fees: $${state.pursuits.reduce((s,p)=>s+(+p.fee||0),0).toLocaleString()}</p>${pursuitTable(state.pursuits.slice(0,4))}</div>`}
function pursuits(){return `<div class="card section"><h3>Proposal Pipeline</h3><p class="sub">Track opportunity, architect, developer, fee, due date, probability, and next action.</p><button class="btn" onclick="editPursuit()">Add pursuit</button><div style="height:14px"></div>${pursuitTable(state.pursuits.filter(textMatch))}</div>`}
function pursuitTable(rows){return `<div class="tablewrap"><table class="table"><thead><tr><th>Opportunity</th><th>Architect</th><th>Developer</th><th>Fee</th><th>Due</th><th>Prob.</th><th>Status</th><th>Next Action</th><th></th></tr></thead><tbody>${rows.map(p=>`<tr><td><b>${p.opportunity}</b></td><td>${p.architect||''}</td><td>${p.developer||''}</td><td>$${(+p.fee||0).toLocaleString()}</td><td>${fmt(p.due)}</td><td>${p.probability||0}%</td><td>${p.status||''}</td><td>${p.nextAction||''}</td><td><button class="btn small secondary" onclick="editPursuit(${p.id})">Edit</button></td></tr>`).join('')||'<tr><td colspan="9">No pursuits yet.</td></tr>'}</tbody></table></div>`}
function waitingSummary(){return `<div class="card section"><h3>Waiting On - Follow Up Soon</h3>${waitingTable(state.waiting.filter(w=>w.status!=='Done').slice(0,5))}</div>`}
function waiting(){return `<div class="card section"><h3>Waiting On</h3><p class="sub">Use this for architect/client/internal follow-ups.</p><button class="btn" onclick="editWaiting()">Add waiting-on item</button><div style="height:14px"></div>${waitingTable(state.waiting.filter(textMatch))}</div>`}
function waitingTable(rows){return `<div class="tablewrap"><table class="table"><thead><tr><th>Person</th><th>Company</th><th>Item</th><th>Follow-up</th><th>Related</th><th>Status</th><th></th></tr></thead><tbody>${rows.map(w=>`<tr><td><b>${w.person}</b></td><td>${w.company||''}</td><td>${w.item}</td><td>${fmt(w.followUp)}</td><td>${w.related||''}</td><td>${w.status}</td><td><button class="btn small secondary" onclick="editWaiting(${w.id})">Edit</button></td></tr>`).join('')||'<tr><td colspan="7">Nothing waiting.</td></tr>'}</tbody></table></div>`}
function actions(){return `<div class="card section"><h3>Project Action Log</h3><p class="sub">Project-level tasks: RFIs, submittals, coordination, delegated work.</p><button class="btn" onclick="editAction()">Add project action</button><div style="height:14px"></div><div class="tablewrap"><table class="table"><thead><tr><th>Project</th><th>Action Item</th><th>Assigned To</th><th>Due</th><th>Status</th><th>Notes</th><th></th></tr></thead><tbody>${state.actions.filter(textMatch).map(a=>`<tr><td><b>${a.project}</b></td><td>${a.item}</td><td>${a.assignedTo}</td><td>${fmt(a.due)}</td><td>${a.status}</td><td>${a.notes||''}</td><td><button class="btn small secondary" onclick="editAction(${a.id})">Edit</button></td></tr>`).join('')||'<tr><td colspan="7">No actions.</td></tr>'}</tbody></table></div></div>`}
function weekly(){let checks=['Clear completed tasks','Review overdue tasks','Review Waiting On list','Review Proposal Pipeline','Pick next week priorities','Choose Monday Big 3'];return `<div class="grid review"><div class="card section"><h3>Weekly Review Checklist</h3><p class="sub">Run this every Friday or Sunday night.</p>${checks.map(c=>`<label class="check"><input type="checkbox"> <span>${c}</span></label>`).join('')}</div><div class="card section"><h3>Review Notes</h3><div class="modalgrid"><textarea rows="3" placeholder="Wins this week" onchange="state.reviewNotes.wins=this.value;save()">${state.reviewNotes.wins||''}</textarea><textarea rows="3" placeholder="What should be deferred/deleted?" onchange="state.reviewNotes.defer=this.value;save()">${state.reviewNotes.defer||''}</textarea><textarea rows="3" placeholder="Top priorities next week" onchange="state.reviewNotes.nextWeek=this.value;save()">${state.reviewNotes.nextWeek||''}</textarea><textarea rows="3" placeholder="Monday Big 3" onchange="state.reviewNotes.mondayBig3=this.value;save()">${state.reviewNotes.mondayBig3||''}</textarea></div></div></div>${taskSection('Overdue Tasks',t=>!t.completed&&overdue(t.due),true)}${waitingSummary()}${pipelineSummary()}`}
function addTask(){let t={id:Date.now(),title:newTitle.value.trim(),project:newProject.value,priority:newPriority.value,due:newDue.value,context:newContext.value,bucket:newBucket.value,big3:false,completed:false,notes:''}; if(!t.title)return; state.tasks.unshift(t); render()}
function toggleDone(id){let t=state.tasks.find(x=>x.id===id);t.completed=!t.completed;if(t.completed)t.big3=false;render()} function toggleBig(id){let t=state.tasks.find(x=>x.id===id); if(!t.big3 && state.tasks.filter(x=>!x.completed&&x.big3).length>=3)return alert('You already have three Big 3 tasks. Unstar one first.'); t.big3=!t.big3;if(t.big3){t.due=todayISO();t.bucket='Today'}render()} function delTask(id){if(confirm('Delete this task?')){state.tasks=state.tasks.filter(t=>t.id!==id);render()}} function moveBucket(id,dir){let cols=['Today','This Week','Later','Someday'];let t=state.tasks.find(x=>x.id===id);let i=Math.max(0,Math.min(cols.length-1,cols.indexOf(t.bucket)+dir));t.bucket=cols[i];render()}
function showModal(title,html){modalTitle.textContent=title;modalContent.innerHTML=html;modalBg.classList.add('show')} function closeModal(){modalBg.classList.remove('show');render()}
function editTask(id){let t=state.tasks.find(x=>x.id===id);showModal('Edit Task',`<div class="modalgrid"><input id="mTitle" value="${esc(t.title)}"><select id="mProject"><option>${t.project}</option><option>Inbox</option><option>Active Projects</option><option>Proposals / Pursuits</option><option>Business Development</option><option>KPFF Operations</option><option>Personal</option></select><select id="mPriority"><option>${t.priority}</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option></select><input id="mDue" type="date" value="${t.due}"><select id="mBucket"><option>${t.bucket}</option><option>Today</option><option>This Week</option><option>Later</option><option>Someday</option></select><textarea id="mNotes" rows="4" placeholder="Notes">${esc(t.notes||'')}</textarea><div class="actions"><button class="btn" onclick="let t=state.tasks.find(x=>x.id===${id});Object.assign(t,{title:mTitle.value,project:mProject.value,priority:mPriority.value,due:mDue.value,bucket:mBucket.value,notes:mNotes.value});closeModal()">Save</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`)}
function editPursuit(id){let p=state.pursuits.find(x=>x.id===id)||{id:Date.now(),opportunity:'',architect:'',developer:'',fee:0,due:todayISO(),probability:50,status:'Lead',nextAction:''};let isNew=!state.pursuits.find(x=>x.id===id);showModal(isNew?'Add Pursuit':'Edit Pursuit',`<div class="modalgrid"><input id="op" placeholder="Opportunity" value="${esc(p.opportunity)}"><input id="ar" placeholder="Architect" value="${esc(p.architect)}"><input id="dev" placeholder="Developer" value="${esc(p.developer)}"><input id="fee" type="number" placeholder="Fee" value="${p.fee}"><input id="due" type="date" value="${p.due}"><input id="prob" type="number" min="0" max="100" placeholder="Probability" value="${p.probability}"><select id="st"><option>${p.status}</option><option>Lead</option><option>Proposal Due</option><option>Submitted</option><option>Interview</option><option>Won</option><option>Lost</option></select><textarea id="next" rows="3" placeholder="Next action">${esc(p.nextAction)}</textarea><div class="actions"><button class="btn" onclick="savePursuit(${p.id},${isNew})">Save</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`)}
function savePursuit(id,isNew){let p={id,opportunity:op.value,architect:ar.value,developer:dev.value,fee:+fee.value||0,due:due.value,probability:+prob.value||0,status:st.value,nextAction:next.value}; if(isNew)state.pursuits.unshift(p); else Object.assign(state.pursuits.find(x=>x.id===id),p); closeModal()}
function editWaiting(id){let w=state.waiting.find(x=>x.id===id)||{id:Date.now(),person:'',company:'',item:'',followUp:todayISO(),related:'',status:'Waiting'};let isNew=!state.waiting.find(x=>x.id===id);showModal(isNew?'Add Waiting-On Item':'Edit Waiting-On Item',`<div class="modalgrid"><input id="person" placeholder="Person" value="${esc(w.person)}"><input id="company" placeholder="Company" value="${esc(w.company)}"><textarea id="item" rows="3" placeholder="What are you waiting on?">${esc(w.item)}</textarea><input id="follow" type="date" value="${w.followUp}"><input id="rel" placeholder="Related project/pursuit" value="${esc(w.related)}"><select id="wstat"><option>${w.status}</option><option>Waiting</option><option>Followed Up</option><option>Done</option></select><div class="actions"><button class="btn" onclick="saveWaiting(${w.id},${isNew})">Save</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`)}
function saveWaiting(id,isNew){let w={id,person:person.value,company:company.value,item:item.value,followUp:follow.value,related:rel.value,status:wstat.value}; if(isNew)state.waiting.unshift(w); else Object.assign(state.waiting.find(x=>x.id===id),w); closeModal()}
function editAction(id){let a=state.actions.find(x=>x.id===id)||{id:Date.now(),project:'',item:'',assignedTo:'Nick',due:todayISO(),status:'Open',notes:''};let isNew=!state.actions.find(x=>x.id===id);showModal(isNew?'Add Project Action':'Edit Project Action',`<div class="modalgrid"><input id="proj" placeholder="Project" value="${esc(a.project)}"><textarea id="aitem" rows="3" placeholder="Action item">${esc(a.item)}</textarea><input id="assigned" placeholder="Assigned to" value="${esc(a.assignedTo)}"><input id="adue" type="date" value="${a.due}"><select id="astatus"><option>${a.status}</option><option>Open</option><option>In Progress</option><option>Waiting</option><option>Done</option></select><textarea id="anotes" rows="3" placeholder="Notes">${esc(a.notes)}</textarea><div class="actions"><button class="btn" onclick="saveAction(${a.id},${isNew})">Save</button><button class="btn secondary" onclick="closeModal()">Cancel</button></div></div>`)}
function saveAction(id,isNew){let a={id,project:proj.value,item:aitem.value,assignedTo:assigned.value,due:adue.value,status:astatus.value,notes:anotes.value}; if(isNew)state.actions.unshift(a); else Object.assign(state.actions.find(x=>x.id===id),a); closeModal()}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';render()} function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='focusflow-backup-'+todayISO()+'.json';a.click()} function importData(e){let f=e.target.files[0]; if(!f)return; let r=new FileReader(); r.onload=()=>{state=JSON.parse(r.result); render()}; r.readAsText(f)} function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
modalBg.addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()}); render();
</script>
</body>
</html>
